FP18:
  type: problem
  name: Workspace Disorganisation
  plain_language: >
    Cannot maintain organisation systems after initial setup.
    Desks, files, folders decay to disorder within days. The
    problem is sustained maintenance, not the initial sort.
  functional_definition: >
    Maintains a cluttered, disorganised physical and/or digital
    workspace that impedes finding documents, tools, and
    information when needed. Loses important items. Fails to
    maintain filing or organisation systems after initial setup.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 3
        assessment: |
          Impact of disorganisation manifests when users can't find
          something needed — several times per week, not daily.
          Disorganisation itself is constant but the functional
          failure (can't find document, lost item, cluttered workspace
          impeding work) occurs intermittently.
        evidence: |
          OT consensus identifies as common presenting problem [P2C,
          Tier 2]. Users describe chronic state [P1C, Tier 1].
          Functional impact several times per week rather than daily
          crisis.
        evidence_tier: "2"
      differentiation:
        score: 3
        assessment: |
          Many people have messy desks. ADHD version more persistent
          and resistant to organisation attempts, but observable
          failure looks similar. Differentiation: ADHD users cannot
          maintain organisation systems after initial setup — the
          maintenance fails, not the initial sorting. Standard advice
          (filing, labelling) works temporarily but abandoned within
          days. Score 3: difference is in sustainability, not nature.
        evidence: |
          Self-organisation as EF mediator [P1C, Tier 1]. "Organisation
          requires regular, repeated behaviours" which ADHD impairs
          [P2C, Tier 2].
        evidence_tier: "2"
      connectedness:
        score: 2
        assessment: |
          Shares context with other problems (wastes time, contributes
          to overwhelm) but addressing it wouldn't meaningfully reduce
          time blindness, initiation failure, focus, or prioritisation.
          Relatively standalone. Digital disorganisation connects
          loosely to FP09 but distinct failure domains.
        evidence: |
          No cascading effects described in research. OT consensus
          treats as independent intervention area [P2C, Tier 2].
        evidence_tier: "2"
      total: 8
      evidence_tier_avg: 2.0
  refs:
    mechanisms: [MECH05, MECH03]

    claims: [C001]
  cluster_notes: >
    Standalone. Shares self-organisation EF deficit with Cluster B
    but operates in a different domain (physical/digital environment,
    not task execution). Lowest score in the set.
  derived_from: Our_S3


