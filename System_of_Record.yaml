ST_008:
  type: system_ticket
  origin: claim-to-entity promotion system design (2026-02-26)
  status: open
  subject: "claim-first protocol and promotion detection"
  content: >
    The SoR follows a claim-first protocol: all observations enter
    as claims. Entity promotion is a separate step. This ticket
    captures the unresolved design work for making promotion
    emergent rather than top-down.

    PRINCIPLE: An entity earns its type by anchoring its own
    evaluation — evaluations live ON it, not on other entities.
    If a concept's role is to modify how other entities get
    evaluated, it stays a claim or becomes a field on those
    entities. (Established during CC entity type removal.)

    DETECTION SIGNALS (identified, not yet implemented):
    1. Claim referenced as context/framing rather than evidence
    2. Claim develops informal children (concept hub, not evidence)
    3. Claim prose duplicated/paraphrased across other claims
    4. Agent hits evaluation wall — needs to assess something
       with no entity type to hold the assessment
    5. Claim scope exceeds its evidence basis (structural
       assertions beyond what sources support)
    6. Multiple claims share implicit subject with no ID

    Signals 2 and 6 are partially detectable from graph structure.
    Signals 1, 3, 5 need prose comprehension. Signal 4 is
    real-time only — vanishes if not captured at write time.

    DEPENDENCIES (three things must exist):
    1. A maintenance protocol — written instructions for agents
       editing the SoR (what to do, what to check, what to flag).
       Currently does not exist.
    2. A decision log — records when claims are used in decisions.
       Surfaces claims carrying disproportionate decision weight.
       Mechanism TBD (field on claims, staging convention, or
       separate structure).
    3. A question log — records when the SoR cannot answer a
       question asked of it. Surfaces gaps where no claim exists
       but a concept is needed. Mechanism TBD (staging convention
       with query_miss origin, or separate structure).

    The maintenance protocol is the single upstream dependency.
    Decision and question logs are downstream of it — they require
    the editing agent to do something extra at write time, which
    requires documented instructions.

    ALSO NEEDED: a way to capture signal 4 (evaluation wall) at
    write time. Proposed: inline comment annotation on the claim
    (# PROMOTION_SIGNAL: ...) that survives in the file for
    periodic review to pick up.

