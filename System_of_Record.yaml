    is less documented.
  promotion_condition: >
    Promote to claim when workplace-specific emotional
    dysregulation evidence is identified in clinical sources.

# ─────────────────────────────────────────────────────────────
# THESIS CANDIDATES (low confidence initial examples)
# These are starting points for finding the shape of the thesis
# entity type. Do not anchor on these — they need rigorous
# development, may merge/split/be discarded entirely.
# ─────────────────────────────────────────────────────────────

STG_005:
  type: staging
  origin: thesis definition session (2025-02-25)
  status: promoted
  promoted_to: [C054, C055, C056, C057, C058, C059, C060, C061, C062, C063, C064]
  content: >
    Nine initial thesis candidates identified during schema design.
    Low confidence — these exist to find the shape, not to assert
    the final set. Each needs: rigorous statement, counter-thesis
    with evidence, confidence assessment, and validation against
    the thesis definition ("would a confidence change prompt
    strategic reconsideration?").
  candidates:
    - label: "Problem space is real"
      sketch: >
        ADHD causes material, measurable workplace functional
        impairment beyond what medication and behavioural therapy
        resolve.
    - label: "Neurological, not behavioural"
      sketch: >
        The functional problems are produced by neurological
        mechanisms, not by insufficient effort, poor habits, or
        character flaws. Interventions must work with the
        neurology, not against it.
    - label: "Medication is insufficient"
      sketch: >
        Pharmacological treatment leaves a significant residual
        functional impairment gap that non-pharma intervention
        can meaningfully address.
    - label: "Existing tools fail structurally"
      sketch: >
        Current productivity tools fail for ADHD users due to
        structural design assumptions incompatible with ADHD
        cognition. Tools that persist succeed through low
        meta-challenge exposure, not through deliberate
        ADHD-informed design.
    - label: "The gap is interdisciplinary"
      sketch: >
        Effective solutions require simultaneous competence in
        neuroscience, product design, and technical capability.
        The gap exists partly because these disciplines rarely
        converge in a single team.
    - label: "Ecosystem incentives are misaligned"
      sketch: >
        Research funding, VC investment, and enterprise procurement
        structures systematically undervalue or deprioritise
        non-pharma ADHD workplace interventions.
    - label: "Demand signal is misleading"
      sketch: >
        User and practitioner demand points toward high-effort,
        high-engagement solutions (the models with highest
        meta-challenge exposure), directing builders toward
        the wrong design space.
    - label: "Standard product methodology is degraded"
      sketch: >
        Conventional product discovery and validation methods
        produce unreliable signals for this population. CC03
        blocks honest discovery, early engagement metrics are
        MC6 in disguise.
    - label: "Passive engagement can substitute for active engagement"
      sketch: >
        Product interaction models that minimise user-initiated
        effort and habit formation can deliver meaningful
        functional improvement — the core untested assumption
        behind low-MC-exposure engagement models.
  promotion_condition: >
    Each candidate is promoted to a full thesis claim (with
    group: thesis) when it has: a rigorous statement, a
    counter_thesis with evidence and strength assessment,
    a confidence value, and passes the definition test.

STG_006:
  type: staging
  origin: thesis steel-man review (2025-02-25)
  status: open
  content: >
    Open questions from thesis map development and steel-man
    analysis. All require user decision before the thesis set
    is finalised. These are flagged for review, not blocking
    further work.
  questions:
    - id: Q1
      subject: "C054 demotion"
      description: >
        C054 ("problem space is real and material") may be too
        well-evidenced to qualify as a thesis under the agreed
        definition ("contested assumption where a confidence change
        would prompt strategic reconsideration"). Confidence is 1.5
        (Tier 1 evidence from multiple sources). A confidence change
        is nearly inconceivable given WFIRS data, Work-MAP RCT, and
        P2E interviews. Should C054 be demoted to a standard claim
        (removing group: thesis) or kept as the foundational thesis
        that anchors the dependency chain? If demoted, all other
        theses lose their grounding reference.
    - id: Q2
      subject: "C055+C057 merge validation"
      description: >
        C055 and C057 were merged because "mechanisms constrain
        design" and "tools fail structurally" are the same strategic
        risk from different angles. Confirm this merge is correct or
        flag if they should be re-separated. The merged thesis is
        longer and denser than the others.
    - id: Q3
      subject: "C058+C059 overlap"
      description: >
        Steel-man analysis flagged C058 (interdisciplinary barrier)
        and C059 (market mispricing) as sharing significant DNA —
        both partially explain why the market is unfunded. They
        were kept separate because they imply different strategic
        responses (C058: build a rare team = moat; C059: better
        positioning/narrative = GTM). Should they merge or remain
        separate axes of uncertainty?
    - id: Q4
      subject: "Technical feasibility thesis"
      description: >
        The steel-man analysis identified a missing coverage area:
        no thesis addresses whether the required technical
        capabilities (ambient capture, on-device processing,
        knowledge graphs, cross-platform integration) are actually
        achievable at the required quality and cost within the
        relevant time horizon. The technology research (S9B-S9J)
        was quarantined from the phenomena layer, so the SoR has
        no technology claims to reference. Should a technical
        feasibility thesis be added, or is this outside the SoR
        scope?
    - id: Q5
      subject: "Dependency structure encoding"
      description: >
        The thesis set has a clear dependency chain: C054
        (foundational) → C055 (mechanisms constrain design) →
        C060 (demand misleads) → C062 (passive can substitute)
        → C064 (unit economics work). C062 is the strategic hinge
        — the highest-risk, lowest-evidence thesis that the
        business case depends on. Currently dependencies are
        captured in refs.depends_on but not structurally typed
        (logical dependency vs evidence dependency vs thematic
        relationship). Should the data model distinguish these,
        or is the current flat depends_on sufficient?
    - id: Q6
      subject: "Thesis review cycle"
      description: >
        All 11 thesis entities carry draft_review: true. What is
        the intended review process? Options: (a) user reviews
        each thesis statement + counter and approves/edits,
        (b) user reviews the set holistically and approves/rejects,
        (c) user identifies which theses to test first and the
        review becomes a prioritisation exercise. This affects
        SR_005 (settled flags) and any future strategic review
        cycle.
