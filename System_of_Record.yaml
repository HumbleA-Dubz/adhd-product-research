# ═══════════════════════════════════════════════════════════════
# SOURCES
# Bibliography of original cited research and evidence.
# Claims reference these source IDs.
# ═══════════════════════════════════════════════════════════════

Fuermaier_2021:
  type: source
  name: "Fuermaier et al., 2021 — ADHD at the Workplace (WFIRS)"
  description: >
    German outpatient study using Weiss Functional Impairment
    Rating Scale. n=134 ADHD adults vs matched controls and
    general community sample. Primary source for WFIRS work
    item prevalence data.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8295111/
  analysis_docs: [P1A, P1C]
  limitations: >
    Clinical outpatient sample — may over-represent impairment
    vs community ADHD population. German sample — cultural
    context may affect workplace norms.

deGraaf_2008:
  type: source
  name: "de Graaf et al., 2008 — WHO World Mental Health Survey"
  description: >
    WHO survey of 7,075 workers across 10 countries measuring
    productivity loss (presenteeism and absenteeism) in workers
    with ADHD. Source of the 22.1 extra lost days figure.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC2665789/
  analysis_docs: [P1A]
  limitations: >
    Self-report measure of role performance. "Lost days" are
    estimated equivalents, not direct observation.

Swedish_Population_2021:
  type: source
  name: "Swedish population cohort, 2021 — Employment outcomes"
  description: >
    Population register study. N=~64,000 including 9,718 ADHD,
    48,590 controls, 5,582 siblings. Source of 10.2x disability
    pension risk, 2.7x long-term sickness absence risk.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10009402/
  analysis_docs: [P1A, P1C]
  limitations: >
    Register-based diagnoses — captures treated ADHD, may miss
    undiagnosed individuals. Swedish welfare system context.

Barkley_Murphy_2010:
  type: source
  name: "Barkley & Murphy, 2010 — Occupational functioning in ADHD"
  description: >
    Structured occupational history interviews. Documented
    higher rates of jobs quit, formal discipline, interpersonal
    trouble, and impaired employer ratings in ADHD adults.
    Cited by 751+ papers.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://academic.oup.com/acn/article/25/3/157/3840
  analysis_docs: [P1A, P1C]
  limitations: >
    Retrospective occupational history — subject to recall bias.

Adamou_2013:
  type: source
  name: "Adamou et al., 2013 — Occupational health consensus"
  description: >
    International occupational health consensus concluding ADHD
    causes impairment "in all aspects related to employment."
    Safety risk documentation.
  source_type: consensus_statement
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC3599848/
  analysis_docs: [P1A]
  limitations: >
    Consensus statement — reflects expert opinion at time of
    publication.

Norwegian_Employment_Study:
  type: source
  name: "Norwegian study — Inattention and employment status"
  description: >
    N=149. Found inattention significantly predicted employment
    status while hyperactivity/impulsivity, comorbidities, and
    demographics did not. Inattention correlations r=0.40-0.60
    with work problems.
  source_type: clinical_study
  evidence_tier: Tier 1-2
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12128943/
  analysis_docs: [P1C]
  limitations: >
    Smaller sample (n=149). Single-country context.

Burnout_Mediation_2024:
  type: source
  name: "Job burnout mediation study, 2024 — EF deficit pathways"
  description: >
    Field study of 171 employees. Identified self-management
    to time as the most significant executive function deficit
    mediating the ADHD → burnout relationship.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC11007411/
  analysis_docs: [P1C, P2C]
  limitations: >
    Mediation analysis — identifies pathways but the specific
    mediators tested may not be exhaustive. Emotional regulation
    was not included as a mediator variable.

Alderson_2020:
  type: source
  name: "Alderson et al., 2020 — Working memory bifactor model"
  description: >
    Bifactor modelling of working memory deficits in ADHD.
    Effect sizes d=1.63-2.03, with 75-81% of ADHD individuals
    showing measurable impairment in central executive WM.
  source_type: meta_analysis
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC7483636/
  analysis_docs: [P3B]
  limitations: >
    Meta-analytic — aggregates across studies with varying
    methods and populations.

Missonnier_2013:
  type: source
  name: "Missonnier et al., 2013 — Encoding deficit neural evidence"
  description: >
    First neural evidence of impaired encoding in adult ADHD.
    Lower P3 amplitude during working memory encoding stage,
    indicating ineffective attentional resource allocation.
    Published in Clinical Neurophysiology.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.sciencedirect.com/science/article/abs/pii/S1388245713013485
  analysis_docs: [P3B]
  limitations: >
    Neural study — sample size not noted in our documents.
    Measures neural correlates, not directly workplace behaviour.

Bonilla_2020:
  type: source
  name: "Bonilla et al., 2020 — WM encoding/retrieval in ADHD"
  description: >
    Confirmed that while binding processes are intact, attention-
    related encoding and retrieval processes are compromised in
    ADHD. Published in Scientific Reports.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.nature.com/articles/s41598-020-64678-x
  analysis_docs: [P3B]
  limitations: >
    Laboratory task — ecological validity for workplace meetings
    is inferred, not directly measured.

Fuermaier_2013:
  type: source
  name: "Fuermaier et al., 2013 — Prospective memory in ADHD"
  description: >
    Large-scale impairment in task planning abilities. 45 ADHD
    adults vs 45 matched controls. Published in PLOS ONE.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0058338
  analysis_docs: [P3B]
  limitations: >
    Relatively small sample (n=90 total).

Fuermaier_2016:
  type: source
  name: "Fuermaier et al., 2016 — Methylphenidate effects on memory"
  description: >
    Found medication improves memory but leaves considerable
    impairments vs normal functioning. Large deficits persist
    in story recall and prospective memory even when treated.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.tandfonline.com/doi/full/10.1080/23279095.2015.1124108
  analysis_docs: [P3B, S10]
  limitations: >
    Single medication (methylphenidate). Other medications may
    show different effects.

Lauder_2024:
  type: source
  name: "Lauder et al., 2024 — Meta-analysis of workplace interventions"
  description: >
    Meta-analysis comparing pharmacological (d=0.19) and
    psychosocial (d=0.56) interventions on work-relevant
    outcomes for adults with ADHD. Psychosocial interventions
    showed significantly larger effects.
  source_type: meta_analysis
  evidence_tier: Tier 1
  url: https://journals.sagepub.com/doi/10.1177/27546330241292984
  analysis_docs: [P2C]
  limitations: >
    Meta-analytic — pooled effect sizes may mask heterogeneity.
    Work-relevant outcomes defined broadly.

WorkMAP_RCT:
  type: source
  name: "Grinblat & Rosenblum, 2023 — Work-MAP telehealth RCT"
  description: >
    Randomised controlled trial of telehealth metacognitive
    intervention for adults with ADHD. 11 weekly sessions.
    15-19% of participants improved EF scores from abnormal to
    normal range, sustained at 3-month follow-up.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10336612/
  analysis_docs: [P2C]
  limitations: >
    Structured therapeutic programme with clinician — not
    directly comparable to software-delivered intervention.

Medication_Adherence_2024:
  type: source
  name: "Medication adherence observational study (n=4,011)"
  description: >
    Found average medication adherence of 56%, with only 27.5%
    meeting the 80% coverage threshold for therapeutic benefit.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: "Pubmed: 40357727"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Single observational study. Adherence patterns may vary
    by medication type and healthcare system.

Medication_Discontinuation_2024:
  type: source
  name: "Karolinska Institutet, 2024 — Multinational discontinuation"
  description: >
    Multinational study of 1.2M patients across 9 countries.
    Found 50-70% of adolescents and adults discontinue ADHD
    medication within the first year.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: "Karolinska Institutet, 2024"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Register-based data. Reasons for discontinuation not
    captured.

Digital_Intervention_Dropout:
  type: source
  name: "Pettersson et al., 2017 / Nordby et al., 2022 — Digital intervention dropout"
  description: >
    77% of ADHD adults did not complete self-guided digital
    interventions. In broader self-guided interventions, >90%
    drop out after 2 modules in open-distribution versions.
    Cited in Frontiers in Digital Health.
  source_type: meta_analysis
  evidence_tier: Tier 1-2
  url: "Nordby et al. 2022, Frontiers in Digital Health"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Self-guided only — coached digital interventions may have
    better completion. The >90% figure is for depression
    interventions, not ADHD-specific.

P2A_Community_Reports:
  type: source
  name: "ADHD community self-reports (Reddit, ADDitude, forums)"
  description: >
    User-reported workplace struggles from r/ADHD, r/ADHD_
    Programmers, ADDitude Magazine surveys, and ADHD community
    forums. Source of qualitative descriptions like "invisible
    barrier," "app graveyard," and "out of sight, out of mind."
  source_type: user_evidence
  evidence_tier: Tier 3
  url: "Multiple community sources"
  analysis_docs: [P2A, P2B]
  limitations: >
    Self-selected. No diagnosis verification. Recall bias.
    Frustration likely over-represented. Not generalisable
    to the ADHD population as a whole.

ADDitude_Poll:
  type: source
  name: "ADDitude Magazine workplace challenges poll (n=~1,000)"
  description: >
    Survey of ~1,000 ADHD adults on biggest work challenges.
    29.27% cited focusing consistently as #1, 21.86% cited
    prioritisation.
  source_type: user_evidence
  evidence_tier: Tier 3
  url: "ADDitude Magazine"
  analysis_docs: [P2A]
  limitations: >
    Self-selected readership. Likely skews toward diagnosed,
    treatment-seeking adults.

ADHD_Coaching_Survey:
  type: source
  name: "ADHD coaching workforce survey"
  description: >
    Found 72.7% of ADHD coaches self-identify as having or
    suspecting ADHD. 60.9% began practicing during/after COVID.
    98.9% use lived experience to inform services.
  source_type: practitioner_study
  evidence_tier: Tier 2
  url: "Cited in P2C"
  analysis_docs: [P2C]
  limitations: >
    Self-report from practitioners. Coach qualifications and
    methodologies vary widely.


# ═══════════════════════════════════════════════════════════════
# CLAIMS
# Evidence statements with typed relationships.
# The evidence base for the entire system of record.
# ═══════════════════════════════════════════════════════════════

C001:
  type: claim
  confidence: 1.0
  statement: >
    Adults with ADHD show clusters of observable problems across
    productivity, time management, reliability, interpersonal
    behaviour and safety simultaneously, with more than 80%
    reporting at least one significant work problem and ~60%
    reporting three or more distinct problems.
  refs:
    sources: [Fuermaier_2021]
  comments: >
    German outpatient sample (n=134) using WFIRS scale.
    Foundational claim establishing multi-domain impairment.

C002:
  type: claim
  confidence: 1.0
  statement: >
    Workers with ADHD lose 22.1 extra days per year of role
    performance versus similar workers without ADHD, with more
    than half the total loss occurring on days the worker is
    present (presenteeism), not absent.
  refs:
    sources: [deGraaf_2008]
  comments: >
    WHO World Mental Health Survey, 7,075 workers across 10
    countries. The presenteeism finding is significant — the
    problem is not absence but reduced output while present.

C003:
  type: claim
  confidence: 1.0
  statement: >
    Adults with ADHD have a 10-fold higher risk of disability
    pension and only 22-24% employment rates versus 72-79% in
    control populations, consistent across Norwegian and Swedish
    population cohorts.
  refs:
    sources: [Swedish_Population_2021, Norwegian_Employment_Study]
    challenged_by: [C004]
  comments: >
    Swedish cohort N=~64,000 (including 9,718 ADHD); Norwegian
    clinical sample. These are endpoint data showing labour
    market exit, not just difficulty.

C004:
  type: claim
  confidence: 1.0
  statement: >
    The most common self-reported work impairment (69%) is
    "problems working to your potential" — an internal sense of
    underperformance — while actual termination rates are lower
    (20-23%), suggesting many ADHD adults experience their
    performance as worse than employers perceive it.
  refs:
    sources: [Fuermaier_2021, Barkley_Murphy_2010]
    challenged_by: [C005]
  comments: >
    WFIRS item #10 from Fuermaier; termination data from
    Barkley & Murphy occupational history. The gap between
    subjective distress and objective job loss matters for
    product design.

C005:
  type: claim
  confidence: 1.0
  statement: >
    Even when blinded to ADHD diagnosis, employers rate ADHD
    employees as having significantly greater inattentiveness,
    poor punctuality, time management problems, and overall
    poorer work performance than controls.
  refs:
    sources: [Barkley_Murphy_2010]
  comments: >
    Validates that impairment is observable, not just self-
    perceived. Partially qualifies C004 — the gap between
    self-report and employer perception may be smaller than
    the internal/external framing suggests.

C006:
  type: claim
  confidence: 1.5
  statement: >
    Inattention symptoms show the strongest correlations
    (r=0.40-0.60) with work problems across both community and
    clinical samples. Inattention significantly predicts
    employment status while hyperactivity/impulsivity,
    comorbidities, and demographics do not.
  refs:
    sources: [Norwegian_Employment_Study]
  comments: >
    N=149, multivariate analysis. This is why the mechanism
    layer focuses on attention allocation, not hyperactivity.

C007:
  type: claim
  confidence: 1.0
  statement: >
    Objective cognitive tests account for little variance in
    workplace functioning; self-reported everyday behaviours
    predict work outcomes much better.
  refs:
    sources: [Barkley_Murphy_2010]
  comments: >
    Drawn from occupational history comparison of neuropsych
    measures versus structured interview data. General finding
    replicated across the ADHD workplace literature — ecological
    validity of laboratory tests is poor.

C008:
  type: claim
  confidence: 3.5
  statement: >
    Time blindness in ADHD is a fundamental difference in time
    perception, not merely poor planning. Standard time
    management tools (calendars, to-do lists) consistently fail
    for ADHD users because they assume an internal time sense
    that does not exist.
  refs:
    sources: [Burnout_Mediation_2024, Fuermaier_2021, P2A_Community_Reports]
    depends_on: [C009]
  comments: >
    Burnout mediation study identified time management as key
    EF deficit; Fuermaier WFIRS data quantified the impairment;
    community reports document consistent tool failure. The
    "assume an internal time sense" framing is our analytical
    interpretation of why tools fail, hence typed as
    interpretation.

C009:
  type: claim
  confidence: 1.0
  statement: >
    Self-management to time was identified as the most
    significant executive function deficit mediating the
    relationship between ADHD and job burnout.
  refs:
    sources: [Burnout_Mediation_2024]
  comments: >
    Field study of 171 employees. Mediation analysis
    identifying time management as the strongest EF pathway
    from ADHD to occupational failure.

C010:
  type: claim
  confidence: 2.5
  statement: >
    Coaches and occupational therapists consistently prioritise
    time management as the foundation for intervention because
    it creates cascading effects: missed deadlines, incomplete
    projects, chronic lateness, and job instability all follow
    from time management deficits.
  refs:
    sources: [ADHD_Coaching_Survey, Burnout_Mediation_2024]
    depends_on: [C009]
  comments: >
    Practitioner consensus on causal ordering, corroborated by
    the mediation study's quantitative identification of time
    management as primary EF mediator.

C011:
  type: claim
  confidence: 3.0
  statement: >
    Task initiation failure in ADHD is qualitatively different
    from procrastination. Users describe an "invisible barrier"
    where they know exactly what to do but cannot start, due to
    altered reward-processing systems. Standard productivity
    advice ("just start") fails because it assumes a functioning
    initiation system.
  refs:
    sources: [P2A_Community_Reports, ADDitude_Poll]
  comments: >
    Community self-reports (Reddit threads) and ADDitude poll
    data on task initiation. The phenomenology ("invisible
    barrier") is directly reported. The causal attribution to
    reward processing is our interpretation, hence the type.

C012:
  type: claim
  confidence: 2.0
  statement: >
    The ADHD brain activates on urgency, novelty, interest,
    challenge, and passion (the INCUP framework) rather than
    importance. Standard importance-based appeals (long-term
    consequences, obligation) are structurally mismatched to
    ADHD activation patterns.
  refs:
    sources: [P2A_Community_Reports, ADHD_Coaching_Survey]
  comments: >
    INCUP framework originates from Dodson's clinical work
    (not a formal study in our bibliography — established
    clinical knowledge). Community reports and practitioner
    data provide the evidence that importance-based tools
    fail in practice. Our contribution is applying the
    framework to product design implications.

C013:
  type: claim
  confidence: 3.0
  statement: >
    Delay discounting is a documented mechanism in ADHD where
    distant rewards lose motivational value exponentially,
    directly causing long-term project neglect despite
    intellectual understanding of importance.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Delay discounting is well-established in ADHD neuroscience
    literature but no specific delay discounting study is in
    our bibliography. The project neglect manifestation is
    evidenced by community reports of long-term task
    abandonment patterns. Consider adding a primary delay
    discounting study if this claim needs strengthening.

C014:
  type: claim
  confidence: 1.0
  statement: >
    Working memory impairment in ADHD shows effect sizes of
    d=1.63-2.03 with 75-81% of individuals showing measurable
    impairment. Neurophysiological evidence shows lower P3
    amplitude during encoding, indicating ineffective
    attentional resource allocation at the encoding stage.
  refs:
    sources: [Alderson_2020, Missonnier_2013]
  comments: >
    Tier 1 clinical evidence. Alderson meta-analysis (effect
    sizes and prevalence), Missonnier study (P3 neural
    evidence). Separates encoding deficit from retrieval
    failure — information never reaches storage.

C015:
  type: claim
  confidence: 3.5
  statement: >
    Meeting memory failure occurs despite active engagement
    and comprehension during the meeting. Users understand
    content in real time but encoding fails silently — users
    cannot recall even the gist afterward.
  refs:
    sources: [Missonnier_2013, Bonilla_2020, P2A_Community_Reports]
    depends_on: [C014]
  comments: >
    Neural evidence (Missonnier, Bonilla) combined with user
    self-reports of the lived experience. The "despite active
    engagement" qualifier is critical — this is not an attention
    problem but an encoding problem.

C016:
  type: claim
  confidence: 1.0
  statement: >
    Medication improves memory performance but leaves
    considerable impairments compared to normal functioning,
    with large deficits persisting in story recall and
    prospective memory even in treated adults with ADHD.
  refs:
    sources: [Fuermaier_2016]
  comments: >
    Methylphenidate study. Key caveat: medication does not
    normalise these deficits. Tools addressing encoding and
    prospective memory are necessary even for medicated
    populations.

C017:
  type: claim
  confidence: 1.0
  statement: >
    Email management failure manifests as reading emails, forming
    intention to reply, then the intention vanishing from
    awareness entirely — the "read and forgot" pattern. One
    user was terminated specifically for failing to send a
    calendar invite.
  refs:
    sources: [Fuermaier_2013, P2A_Community_Reports]
  comments: >
    Fuermaier 2013 documents the prospective memory impairment
    mechanism (d=large, n=90); community reports provide the
    workplace manifestation and employment consequences.

C018:
  type: claim
  confidence: 1.0
  statement: >
    No existing email tool addresses the core ADHD email failure
    mechanism: prospective memory failure for reply intentions.
    All tools focus on inbox volume, processing speed, search,
    or visual overwhelm, but none proactively resurface
    forgotten reply intentions.
  refs:
    sources: [Fuermaier_2013, P2A_Community_Reports]
  comments: >
    Gap analysis: Fuermaier 2013 establishes the prospective
    memory mechanism; community reports document which tool
    features users actually encounter (none addressing PM).
    Typed as interpretation because "no tool" is based on our
    review's coverage, which may not be exhaustive.

C019:
  type: claim
  confidence: 3.0
  statement: >
    The "out of sight, out of mind" pattern is described as
    fundamental by users: "Those apps will NEVER WORK because
    you have to remember to look at them, which you won't."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Direct user quote from r/ADHD_Programmers. This is the
    circular dependency expressed as a prospective memory
    problem — the tool itself becomes subject to the deficit
    it addresses.

C020:
  type: claim
  confidence: 2.0
  statement: >
    The overwhelm-burnout cycle follows a documented pattern:
    time management difficulties → missed deadlines → overtime
    compensation → energy depletion → stress → emotional
    dysregulation increases → performance decline → negative
    feedback → job instability → repeat.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Practitioner-documented cascade pattern reported by
    coaches and occupational therapists. Emotional
    dysregulation is both a component and an amplifier.

C021:
  type: claim
  confidence: 3.0
  statement: >
    Users report standard ADHD strategies as explicitly
    counterproductive: Pomodoro technique interrupts hyperfocus
    and creates "2 opportunities for failure an hour"; starting
    with hardest task requires warm-up that doesn't exist;
    increased pressure causes "brain shutdown."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    The "brain shutdown" under pressure is an emotional
    dysregulation response. The Pomodoro/hardest-task failures
    are reward-processing mismatches. Both are active harm
    from neurotypical-designed tools.

C022:
  type: claim
  confidence: 3.0
  statement: >
    No productivity tool tested by ADHD users shows sustained
    success. Users report setup hyperfocus (spending days
    configuring), followed by abandonment within 3-14 days,
    creating an "app graveyard." Not a single tool shows
    >90-day sustained use in community reports.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Universal pattern across Notion, Todoist, Trello, ClickUp,
    Asana, Habitica, Finch. Structural failure, not incidental.

C023:
  type: claim
  confidence: 1.0
  statement: >
    Five meta-challenges apply universally to any ADHD product:
    Novelty Decay, Circular Dependency, Shame-Avoidance Spiral,
    Disclosure Constraint, and Notification Desensitisation.
  refs:
    sources:
      - P2A_Community_Reports
      - ADHD_Coaching_Survey
      - Medication_Adherence_2024
      - Medication_Discontinuation_2024
      - Digital_Intervention_Dropout
  comments: >
    Our analytical framework, constructed from five evidence
    streams: community reports (novelty decay, circular
    dependency), practitioner data (shame-avoidance, disclosure
    constraint), and clinical studies (medication adherence and
    digital intervention dropout as baseline comparators for
    notification desensitisation and novelty decay). The
    grouping into five named challenges is our construction;
    each individual challenge traces to specific evidence.

C024:
  type: claim
  confidence: 1.0
  statement: >
    ADHD medication adherence averages 56%, with only 27.5%
    meeting the 80% coverage threshold, and 50-70% discontinuing
    within the first year. If the gold-standard intervention
    fails retention, digital tools should expect equal or worse.
  refs:
    sources: [Medication_Adherence_2024, Medication_Discontinuation_2024]
  comments: >
    Two studies: adherence study (n=4,011) for the 56% and
    27.5% figures; Karolinska multinational study (1.2M
    patients, 9 countries) for the 50-70% discontinuation
    figure. The final sentence is our interpretation.

C025:
  type: claim
  confidence: 1.5
  statement: >
    77% of ADHD adults did not complete self-guided digital
    interventions in a meta-analysis of treatment dropout.
    More than 90% drop out after 2 modules in open-distribution
    self-guided interventions.
  refs:
    sources: [Digital_Intervention_Dropout]
  comments: >
    Pettersson et al. 2017 / Nordby et al. 2022. The >90%
    figure is from broader self-guided interventions (not
    ADHD-specific). This distinction matters for applying the
    dropout rate to ADHD-specific products.

C026:
  type: claim
  confidence: 2.0
  statement: >
    Both coaches and OTs report that ADHD adults face a
    consistent disclosure dilemma at work: fear of
    discrimination, uncertainty about whether disclosure helps,
    managers who don't know how to respond, and lack of
    organisational ADHD understanding.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Practitioner-reported pattern. Products must work without
    requiring the user to explain or justify their ADHD to
    colleagues.

C027:
  type: claim
  confidence: 3.0
  statement: >
    Users want tools that "intervene before we get stuck, not
    assistants waiting for us to remember to ask."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Direct user quote. Explicit demand for product-initiated
    intervention over user-initiated tools.

C028:
  type: claim
  confidence: 1.0
  statement: >
    Passive Capture and Structured Delivery has zero habit-
    formation burden and the strongest retention profile because
    the user changes nothing about how they work. Value
    compounds over time as the knowledge graph grows.
  refs:
    sources: [P2A_Community_Reports, Fuermaier_2013]
  comments: >
    Community reports provide the evidence base (tool
    abandonment patterns, habit-formation as failure point);
    Fuermaier 2013 establishes why prospective memory burden
    predicts failure. The retention and compounding claims are
    hypothesised from these structural characteristics, not
    observed in longitudinal data.

C029:
  type: claim
  confidence: 2.0
  statement: >
    Structured Check-In / Guided Routine is the model most
    recommended by practitioners and most abandoned by users.
    It has the worst meta-challenge vulnerability profile of
    any engagement model.
  refs:
    sources: [ADHD_Coaching_Survey, P2A_Community_Reports]
    challenged_by: [C030]
  comments: >
    Practitioner recommendation from coaching survey;
    abandonment from community data. The paradox is explained
    by practitioners providing external accountability that
    software cannot replicate.

C030:
  type: claim
  confidence: 1.0
  statement: >
    Psychosocial interventions (particularly CBT) show
    significantly larger effects (d=0.56) on work-relevant
    outcomes than pharmacological interventions (d=0.19) in
    a 2024 meta-analysis of adult ADHD workplace outcomes.
  refs:
    sources: [Lauder_2024]
  comments: >
    Tier 1 meta-analysis. Partially qualifies C029 — structured
    interventions DO work, but the evidence is for human-
    delivered structured interventions, not software-delivered.

C031:
  type: claim
  confidence: 1.0
  statement: >
    ADHD coaching/OT interventions incorporating external
    structure, accountability, and client-selected goals show
    15-19% improvement in executive function scores from
    abnormal to normal range, sustained at 3-month follow-up.
  refs:
    sources: [WorkMAP_RCT]
  comments: >
    Randomised controlled trial (Tier 1). 11 weekly telehealth
    sessions. External structure is clinically effective. The
    question is whether software can deliver "external structure"
    without the human.

C032:
  type: claim
  confidence: 1.0
  statement: >
    No single engagement model addresses all problem clusters
    at the "strongly compatible" level. Any product addressing
    the full problem space requires combining multiple
    engagement models.
  refs:
    sources: [Fuermaier_2021, P2A_Community_Reports, ADHD_Coaching_Survey, Lauder_2024]
  comments: >
    Derived from our compatibility analysis, which synthesizes
    across clinical evidence (Fuermaier — problem breadth),
    community data (tool failure patterns), practitioner
    reports (intervention modalities), and the Lauder meta-
    analysis (intervention effect sizes by type). The
    conclusion that no single model covers all clusters is
    structural, not directly measured.

C033:
  type: claim
  confidence: 1.0
  statement: >
    ADHD is heterogeneous. The same engagement model may work
    well for one profile (primarily inattentive) and poorly
    for another (primarily hyperactive/impulsive, combined).
    The research does not differentiate engagement patterns
    by ADHD subtype.
  refs:
    sources: [Fuermaier_2021, Norwegian_Employment_Study]
  comments: >
    Both studies note sample composition and the inattentive-
    predominant finding (C006), but neither differentiates
    engagement or intervention response by subtype. ADHD
    heterogeneity is universally acknowledged in the clinical
    literature.

C034:
  type: claim
  confidence: 3.0
  statement: >
    Engagement model retention profiles are hypothesised based
    on structural characteristics, not observed in longitudinal
    data. The "app graveyard" evidence provides negative data
    on Structured Check-In but limited positive data on other
    models.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    The positive evidence for tool abandonment is strong
    (community data on the failure case). The absence of
    longitudinal retention data for alternative models is
    the caveat — our retention predictions are structural
    inferences, not measurements.

C035:
  type: claim
  confidence: 2.0
  statement: >
    Most ADHD coaching workforce (72.7%) self-identifies as
    having or suspecting ADHD, with 98.9% using lived
    experience to inform services. This creates both credibility
    (lived experience) and potential methodological bias.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Affects interpretation of all practitioner evidence.
    Coaches may recommend strategies that work for their own
    neurotype. The population they serve may not be
    representative.

C036:
  type: claim
  confidence: 2.5
  statement: >
    Deadline misses (FP04) receive causal pressure from both time
    blindness (insufficient time allocated) and focus failure
    (insufficient output produced). Eliminating deadline misses
    likely requires addressing both upstream causes simultaneously.
  refs:
    depends_on: [C008, C006]
  comments: >
    Convergence claim from cluster analysis. FP04 sits at the
    intersection of CL_A (time-based) and CL_C (focus-based)
    clusters.
  derived_from: Our_S4

C037:
  type: claim
  confidence: 2.5
  statement: >
    Long-term project neglect (FP08) receives causal pressure from
    both time blindness (delay discounting compresses time horizon)
    and initiation failure (activation energy highest for low-urgency
    work). Effective intervention likely requires addressing both
    upstream causes simultaneously.
  refs:
    depends_on: [C008, C011]
  comments: >
    Convergence claim from cluster analysis. FP08 sits at the
    intersection of CL_A (time-based) and CL_B (activation-based)
    clusters.
  derived_from: Our_S4

C038:
  type: claim
  confidence: 2.0
  statement: >
    Co-occurring neurodevelopmental conditions (autism, dyslexia,
    dyscalculia, anxiety) substantially change the functional
    profile of ADHD at work. Interview data shows 7/12 ADHD adults
    had co-occurring conditions, and practitioners emphasise that
    ADHD-plus-dyslexia and ADHD-plus-autism produce qualitatively
    different functional patterns.
  refs:
    sources: [Fuermaier_2021, ADHD_Coaching_Survey]
  comments: >
    Comorbidity prevalence from P2E interviews (n=12). Practitioner
    emphasis from P2E (Andrew). WFIRS data (Fuermaier) shows variable
    profiles consistent with comorbidity-driven differences.
  derived_from: Our_KG

C039:
  type: claim
  confidence: 1.0
  statement: >
    ADHD functional problems do not confine to work — the same
    mechanisms that cause task initiation failure at work operate
    across domestic and social contexts. Users do not separate
    "work ADHD" from "life ADHD" and describe struggles spanning
    domains without distinction.
  refs:
    sources: [Fuermaier_2021, P2A_Community_Reports]
  comments: >
    WFIRS explicitly measures impairment across multiple life
    domains (not work-only). P2I community evidence and P2E
    interviews confirm cross-domain spillover as consistent
    pattern.
  derived_from: Our_KG

C040:
  type: claim
  confidence: 3.0
  statement: >
    ADHD users can articulate functional pain in vivid detail but
    struggle to describe what a solution would look like. Wishlists
    tend to restate the problem rather than specify tool features.
    Standard "what would you want?" research questions yield vague
    responses.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    P2E interview evidence (Sarah: unable to specify what "one"
    looks like). P2I/P2G community wishlists describe pain relief
    rather than specific mechanisms. Implies behavioural observation
    outweighs stated preference for feature discovery.
  derived_from: Our_KG

C041:
  type: claim
  confidence: 1.0
  statement: >
    Medication reduces but does not resolve functional workplace
    problems. Adults on medication still experience the full range
    of functional failures, sometimes at reduced intensity.
    Workplace accommodations provide additional benefit beyond
    medication alone.
  refs:
    sources: [WorkMAP_RCT, P2A_Community_Reports]
  comments: >
    Work-MAP RCT showed accommodation benefits beyond medication.
    P2A/P2E: medicated users still report all major functional
    problems. Medication is not an alternative to structural support.
  derived_from: Our_KG

C042:
  type: claim
  confidence: 1.5
  statement: >
    No engagement model is strongly compatible with all six
    problem areas. Any product addressing the full problem space
    requires combining multiple engagement models. A single-model
    product will likely leave gaps in coverage.
  refs:
    depends_on: [C032]
  comments: >
    Affects product architecture decisions and scope/sequencing
    decisions.
  derived_from: Our_CS2

C043:
  type: claim
  confidence: 3.5
  statement: >
    Models where the product comes to the user (M1, M2, M6)
    are consistently less vulnerable to bootstrapping (MC2)
    and notification desensitisation (MC5) than models requiring
    user initiation (M3, M5, M7, M8). This appears to be a
    structural characteristic rather than a design detail.
  refs:
    depends_on: [C019, C022, C025, C027]
  comments: >
    Affects engagement model prioritisation and architecture
    decisions (push vs pull).
  derived_from: Our_CS2

C044:
  type: claim
  confidence: 3.5
  statement: >
    Models that become more valuable over time (M2's knowledge
    graph, M5's calibration data, M4's pattern learning) are
    more resistant to novelty decay (MC1) than models delivering
    fixed-value interactions (M7's check-in, M3's recording).
    Compounding value may create switching cost that counteracts
    the tendency toward disengagement.
  refs:
    depends_on: [C022, C024, C028]
  comments: >
    Affects retention strategy and build sequencing (compound-value
    components first).
  derived_from: Our_CS2

C045:
  type: claim
  confidence: 3.5
  statement: >
    Models that operate in the background (M1, M2, M6) are
    simultaneously resistant to shame (nothing to fall behind
    on) and disclosure (nothing visible to colleagues).
    Foreground models (M3, M5, M7) generate both shame
    artefacts and workplace visibility. Both constraints may
    be addressable through a single architectural choice.
  refs:
    depends_on: [C020, C022, C026]
  comments: >
    Affects architecture decisions (background vs foreground)
    and enterprise/workplace deployment strategy.
  derived_from: Our_CS2

C046:
  type: claim
  confidence: 3.5
  statement: >
    Push-based delivery mitigates bootstrapping (MC2) but
    creates notification desensitisation vulnerability (MC5).
    Pull-based delivery avoids MC5 but creates MC2 vulnerability.
    One potential resolution is embedding in existing workflows
    rather than using either push or pull as primary delivery —
    the ambient presence pattern (M2, M6).
  refs:
    depends_on: [C019, C025]
  comments: >
    Affects notification/delivery architecture and integration
    strategy.
  derived_from: Our_CS2

C047:
  type: claim
  confidence: 2.5
  statement: >
    Structured Check-In (M7) has strong practitioner endorsement
    alongside the weakest meta-challenge profile in our analysis.
    Practitioners provide external accountability that makes
    check-ins work — the practitioner IS the bootstrapping
    mechanism, the shame regulator, and the novelty source.
    These functions may be difficult to replicate in software
    alone.
  refs:
    depends_on: [C029, C030, C031]
  comments: >
    Affects whether to include structured check-in at all and
    human-in-loop vs pure software decisions.
  derived_from: Our_CS2

C048:
  type: claim
  confidence: 4.0
  statement: >
    Passive Capture (M2) shows fewer high vulnerabilities in our
    analysis and strong clinical evidence (Tier 1 encoding/PM
    data), but is strongly compatible with only 2 of 6 problem
    areas (FP07, FP09). The broadest model (M1 Ambient Monitor)
    has weaker evidence and high privacy requirements. The models
    with stronger evidence tend to address fewer problem areas.
  refs:
    depends_on: [C014, C015, C017, C028]
  comments: >
    Affects product scope decisions and evidence-based vs
    coverage-based prioritisation.
  derived_from: Our_CS2

C049:
  type: claim
  confidence: 2.0
  statement: >
    If 56% medication adherence and 50-70% first-year
    discontinuation are the baseline for the gold-standard
    intervention, digital tools may face similar or worse
    retention challenges. Any retention claim for a digital
    product that assumes better retention than medication needs
    strong justification. This reframes retention as "how do
    we deliver value assuming poor retention."
  refs:
    depends_on: [C024, C025]
  comments: >
    Affects retention strategy and value delivery architecture
    (front-load vs compound).
  derived_from: Our_CS5

C050:
  type: claim
  confidence: 4.0
  statement: >
    Meeting memory (FP07) and email (FP09) have the strongest
    clinical evidence (Tier 1), no ADHD-specific tools identified
    in our research, an engagement model with no high
    vulnerabilities in our analysis (M2), and minimal user
    behaviour requirements (passive capture). If risk minimisation
    is a priority, this cluster appears favourable. The tradeoff
    is narrow applicability — only 2 of 13 problems are addressed.
  refs:
    depends_on: [C014, C015, C017, C018, C028]
  comments: >
    Affects product scope decisions and MVP definition.
  derived_from: Our_CS2

C051:
  type: claim
  confidence: 3.5
  statement: >
    Task initiation (FP01) scores highest on frequency (5/5) and
    is among the most-discussed problems in our sources. But the
    most compatible model (M1 Ambient Monitor) has high privacy
    requirements, significant build complexity, and an unresolved
    stuck-vs-thinking detection problem. High demand, high risk.
    The alternative path through M4 (Intelligent Reordering) is
    lower-risk but addresses initiation only partially.
  refs:
    depends_on: [C011, C012, C027]
  comments: >
    Affects product scope decisions and technical risk assessment.
  derived_from: Our_CS2

C052:
  type: claim
  confidence: 2.5
  statement: >
    ADHD is heterogeneous. Engagement patterns, problem severity,
    and intervention response vary by subtype (inattentive,
    hyperactive/impulsive, combined), comorbidity profile,
    medication status, and job type. The research does not
    differentiate by these factors. All claims in this system
    are averages across a heterogeneous population.
  refs:
    depends_on: [C033, C035]
  comments: >
    Affects target user definition, personalisation requirements,
    and confidence in universal claims.
  derived_from: Our_CS2

C053:
  type: claim
  confidence: 3.5
  statement: >
    Engagement model retention profiles are hypothesised from
    structural characteristics, not observed in longitudinal
    data. The only empirically supported retention finding in
    our reviewed literature is negative: Structured Check-In
    models are abandoned. Positive retention claims for other
    models (especially M2's strongest retention) are structural
    inferences that need testing.
  refs:
    depends_on: [C034]
  comments: >
    Affects confidence in retention claims, test design
    priorities, and what to validate first.
  derived_from: Our_CS2


# ─────────────────────────────────────────────────────────────
# THESIS CLAIMS (group: thesis)
# Contested assumptions where a change in confidence would
# prompt strategic reconsideration. Draft set — developed from
# STG_005 candidates plus one identified gap (C063).
# All marked draft_review: true pending user review.
# ─────────────────────────────────────────────────────────────

C054:
  type: claim
  group: thesis
  draft_review: true
  confidence: 1.5
  statement: >
    ADHD produces persistent, measurable workplace functional
    impairment across multiple work domains, affecting the majority
    of diagnosed adults at rates substantially exceeding neurotypical
    populations. This impairment is not an artefact of self-report
    bias, poor motivation, or insufficient effort. The problem space
    is real and material enough to warrant intervention.
  counter_thesis:
    statement: >
      Workplace functional impairment is real but systematically
      overstated by self-report instruments. WFIRS data shows 69%
      of ADHD adults feel they are "working below potential," but
      formal performance consequences (termination, disciplinary
      action) affect only 20-23%. This 3-4x amplification factor
      suggests subjective distress substantially exceeds measurable
      dysfunction. The commercially addressable population may be
      the smaller group with observable performance impact, not the
      larger group experiencing subjective impairment.
    evidence: [Fuermaier_2021, P2A_Community_Reports, C038]
    strength: >
      Has specific force on market sizing and population definition.
      The discrepancy between self-perceived impairment and
      externally observable impairment is documented in both
      clinical (WFIRS) and community (P2I) data. The comorbidity
      interaction (C038 — 7/12 interview participants had co-
      occurring conditions) means some impairment attributed to
      ADHD may be driven by co-occurring conditions, narrowing
      the ADHD-specific addressable problem. Does NOT undermine
      that functional problems exist — challenges the scale and
      the sharpness of the boundary around ADHD-specific impairment.
  refs:
    sources: [Fuermaier_2021, WorkMAP_RCT, Norwegian_Employment_Study]
    depends_on: [C001, C002, C003, C039]
  comments: >
    Highest-confidence thesis. Tier 1 evidence from multiple
    independent sources. Counter-thesis is about magnitude and
    boundary, not existence. If this thesis is wrong, the entire
    SoR is investigating a non-problem. Developed from STG_005
    candidate "Problem space is real."

C055:
  type: claim
  group: thesis
  draft_review: true
  confidence: 2.5
  statement: >
    ADHD neurology requires architecturally different product design,
    not better execution of existing patterns. Neurological mechanisms
    — dopamine reward signalling, working memory limits, attention
    dysregulation, time perception distortion, prospective memory
    failure — constrain which interventions can work. Current
    productivity tools fail because their design assumptions (user-
    initiated engagement, habit-dependent value, visible failure
    accumulation, consistent daily use) are structurally incompatible
    with these mechanisms. The failure is architectural, not a
    quality deficiency. The tool-requires-capacity paradox — tools
    demanding the executive function they aim to support — is the
    signature of structural incompatibility, not poor UX.
  counter_thesis:
    statement: >
      The neurological constraints are real but their design
      implications are overstated. CBT produces larger workplace
      effect sizes (d=0.56) than medication (d=0.19) in a 2024
      meta-analysis, proving behavioural approaches work despite
      neurological substrates. Many tool failures attributed to
      ADHD-specific incompatibility are universal UX failures (poor
      onboarding, notification fatigue, feature overwhelm) affecting
      all users. Some ADHD users succeed with standard tools (P2E
      interview evidence). ADHD heterogeneity (C052) means the
      structural-incompatibility framing may apply to a subset, not
      the population. Better general-purpose tools following
      universal accessibility principles would address ADHD users
      as a side effect of good design, not through ADHD-specific
      architecture.
    evidence: [Lauder_2024, C030, C031, P2A_Community_Reports, C029, C033, C052]
    strength: >
      Strongest where tool failures overlap with neurotypical
      experience — notification fatigue, setup complexity, and
      feature overwhelm affect everyone. The CBT evidence (Tier 1)
      directly demonstrates structured behavioural intervention
      works for this population. P2E interview data shows ADHD
      users succeeding with standard tools (particularly milder
      presentations or effective medication). Counter weakens where
      failures are ADHD-specific at severity levels absent in
      neurotypical populations: tool-requires-capacity paradox
      (needing executive function to use executive function tools),
      prospective memory failure to use the tool at all, and shame
      spirals from visible failure accumulation that trigger
      complete abandonment.
  refs:
    sources: [Lauder_2024, Fuermaier_2021, P2A_Community_Reports, ADHD_Coaching_Survey]
    depends_on: [C004, C005, C006, C007, C008, C009, C010, C029, C030, C032]
    entities: [MECH01, MECH02, MECH03, MECH04, MECH05, MECH06, MC1, MC2, MC3, MC4, MC5, MC6]
  comments: >
    MERGED from original C055 ("Neurological, not behavioural") and
    C057 ("Existing tools fail structurally"). These were not
    independent axes of uncertainty — if the mechanisms do not
    constrain design (C055 false), then the tools do not fail
    structurally (C057 false). If tools fail for quality reasons
    (C057 false), then the mechanisms are not the binding constraint
    (C055 weakened). Merged to avoid double-counting the same
    strategic risk. If the counter is correct, the strategy shifts
    from "different kind of tool" to "better version of existing
    tools with ADHD marketing." STG_005 candidates: "Neurological,
    not behavioural" + "Existing tools fail structurally."

C056:
  type: claim
  group: thesis
  draft_review: true
  confidence: 2.0
  statement: >
    Software can deliver the effective components of external
    cognitive scaffolding — structure, memory augmentation, activation
    support, accountability — that clinical evidence shows works when
    delivered by humans. The medication gap is well-established
    (Tier 1, see C041) and non-pharmacological external structure
    helps (Tier 1, see C031). The contested question is whether
    software can replicate the elements that make human-delivered
    intervention effective, or whether human accountability,
    adaptation, and emotional attunement are the active ingredients
    that software cannot provide.
  counter_thesis:
    statement: >
      Software cannot replicate the active ingredients of effective
      external structure. Work-MAP RCT improvement (15-19%) came from
      clinician-delivered intervention providing real-time adaptation,
      relational accountability, and emotional regulation support.
      The practitioner IS the bootstrapping mechanism, the shame
      regulator, and the novelty source (C047). Software strips away
      precisely these human elements. No evidence exists for software-
      only delivery of external structure producing comparable workplace
      outcomes. The gap between "external structure helps" and
      "software-delivered external structure helps" is the gap between
      evidence and hypothesis.
    evidence: [WorkMAP_RCT, C031, C047, ADHD_Coaching_Survey, Lauder_2024]
    strength: >
      The strongest element: all positive evidence for non-pharma
      workplace improvement is for HUMAN-delivered intervention.
      Zero evidence for software-delivered structural support at
      comparable efficacy. The practitioner accountability function
      (C047) identifies specific human capabilities — relational
      accountability, emotional attunement, real-time adaptation —
      that current software cannot replicate. Counter weakens if AI
      advances close the gap on these capabilities, particularly
      relational modelling and adaptive scaffolding. Also weakens
      where the software provides DIFFERENT effective components
      (perfect memory, passive capture, tireless consistency) rather
      than replicating the human ones.
  refs:
    sources: [WorkMAP_RCT, Lauder_2024]
    depends_on: [C041]
    entities: [CC04]
  comments: >
    Closely related to C054 (problem exists) but addresses a
    different strategic question: not whether the impairment is
    real but whether software is the right delivery mechanism for
    addressing it. If this thesis is wrong, the product needs
    human-in-loop delivery (coaching platform, not standalone
    tool). Developed from STG_005 candidate "Medication is
    insufficient."

C057:
  type: claim
  group: thesis
  draft_review: true
  status: merged_into_C055
  confidence: null
  statement: >
    [MERGED INTO C055] Original thesis "Existing tools fail
    structurally" was not independent of C055 "Neurological
    mechanisms constrain design." Both represented the same
    strategic risk (is ADHD-specific architecture necessary?)
    from different angles. Maintaining both would double-count
    the same uncertainty. See C055 for the merged thesis.
  refs:
    depends_on: [C055]
  comments: >
    Merged during steel-man review. The dependency: if mechanisms
    do not constrain design (C055 false), then tools do not fail
    structurally (C057 false). Not independently testable.
    Original STG_005 candidate: "Existing tools fail structurally."

C058:
  type: claim
  group: thesis
  draft_review: true
  confidence: 4.0
  statement: >
    Effective ADHD workplace tools require simultaneous competence
    in clinical neuroscience (mechanism-aware design), product
    design (meta-challenge-aware architecture, accommodation without
    stigma), and technical implementation (ambient capture, knowledge
    graphs, on-device processing). This three-way competence
    requirement creates a structural barrier to entry that partially
    explains why no well-funded ADHD-specific productivity product
    exists despite a multi-billion-dollar addressable market.
  counter_thesis:
    statement: >
      The interdisciplinary barrier is not unique to ADHD — digital
      health products routinely require clinical, design, and
      technical competence. Diabetes management, mental health
      platforms, chronic pain, and addiction recovery have all
      produced successful products despite similar requirements.
      The absence of funded ADHD workplace tools more likely reflects
      correct market assessment (small, fragmented, difficult
      monetisation) than an unusually high competence barrier. AI/LLM
      advances further reduce the interdisciplinary requirement —
      general-purpose AI can approximate clinical accommodation
      insight without purpose-built neuroscience expertise.
    evidence: [P2A_Community_Reports, C034, C049, C053]
    strength: >
      The digital-health comparison has real force but is weaker
      than it appears. Noom, BetterHelp, and Headspace succeeded
      with interdisciplinary teams — but none face the ADHD meta-
      challenge framework. The critical difference: other health-tech
      products can assume sustained user engagement. ADHD tools
      cannot. Noom's habit-formation model would collapse under MC2
      (novelty-dependent engagement). BetterHelp's scheduling model
      assumes prospective memory. Headspace's streak-based retention
      triggers MC1 (tool-requires-capacity paradox) — maintaining
      a meditation habit requires the executive function meditation
      aims to develop. The interdisciplinary barrier is not just
      "hard health-tech" but "health-tech where the target condition
      undermines the engagement model every other health-tech product
      relies on." The AI-reduces-barrier argument has emerging force
      for the clinical knowledge dimension but does not address the
      design dimension — knowing what accommodations work is not the
      hard part; building a product that ADHD users can sustain
      using is the hard part. Counter is strongest where the market-
      size explanation (investors correctly assess a small market)
      is sufficient without invoking competence barriers at all —
      the competence barrier may be real but irrelevant if the
      market ceiling is genuinely low.
  refs:
    depends_on: [C032, C042]
    entities: [MC1, MC2, MC3, MC4, MC5, MC6]
  comments: >
    Lowest-confidence thesis in the strategic set. Largely
    inferred — no source directly studies why ADHD workplace
    products are underfunded. The thesis matters because if the
    barrier IS interdisciplinary competence, that is a moat. If
    it is market size, there is no moat. Developed from STG_005
    candidate "The gap is interdisciplinary."

C059:
  type: claim
  group: thesis
  draft_review: true
  confidence: 4.0
  statement: >
    Investment markets systematically undervalue non-pharmacological
    ADHD workplace intervention. The absence of well-funded products
    in a multi-billion-dollar addressable market growing at 11-16%
    CAGR reflects market mispricing driven by: investors
    extrapolating from the failure rate of structurally flawed tools,
    difficulty demonstrating clinical efficacy for non-pharma
    approaches, and enterprise procurement structures that route
    ADHD accommodation through HR/disability frameworks rather than
    software procurement.
  counter_thesis:
    statement: >
      The market is correctly valued. Professional investors evaluate
      ADHD productivity tools and pass for articulable reasons:
      the addressable segment is too small for VC-scale returns,
      B2C ADHD tools have poor unit economics (high acquisition
      cost, high churn, low willingness to pay), enterprise sales
      face the disclosure barrier (employees will not use employer-
      provided ADHD tools), and the app graveyard problem means
      standard SaaS retention metrics are structurally unachievable.
      The B2C ADHD app market exists at small scale (Tiimo, Llama
      Life, Focusmate) — the ceiling may genuinely be low.
    evidence: [P2A_Community_Reports, C034, C049, C053]
    strength: >
      The "investors are rational" argument has significant force.
      The disclosure constraint (MC4) directly undermines enterprise
      distribution channels. The retention data gap (C053) means
      positive retention claims for alternative engagement models
      are untested hypotheses, not evidence. The counter weakens
      if structurally different engagement models (passive capture,
      ambient monitoring) produce fundamentally different retention
      curves than the habit-dependent models that have failed — but
      this is precisely the untested assumption that C062 addresses.
      Circular dependency: this thesis depends partly on C062 being
      correct.
  refs:
    depends_on: [C034, C049, C053]
    entities: [MC4]
  comments: >
    Market data referenced here (market size, CAGR, competitive
    landscape) is from S10 synthesis and P2D landscape analysis,
    not encoded as formal claims in this system. The market
    assessment layer is outside the SoR scope — this thesis sits
    at the boundary between research evidence and market analysis.
    Developed from STG_005 candidate "Ecosystem incentives are
    misaligned" (reframed from incentive mechanism to market
    mispricing).

C060:
  type: claim
  group: thesis
  draft_review: true
  confidence: 2.5
  statement: >
    User demand and practitioner recommendation converge on high-
    structure, high-engagement intervention models — daily check-ins,
    planning rituals, habit trackers — which are precisely the models
    with the highest meta-challenge vulnerability profiles. Following
    demand leads toward the design space with the highest structural
    failure probability. The Missing Wish-List phenomenon (CC03)
    means users cannot specify what would actually work; they
    describe variants of what they already know.
  counter_thesis:
    statement: >
      Demand signal is accurate. Users and practitioners know what
      helps. Structured intervention produces the largest workplace
      effect sizes (CBT d=0.56 vs medication d=0.19). The high
      meta-challenge vulnerability of Structured Check-In (M7)
      reflects software delivery failure, not a flaw in the
      intervention model itself. Rather than abandoning what users
      say they want, the correct response is to solve the software-
      delivery problem — perhaps through AI providing human-like
      accountability, adaptation, and relational continuity.
      Ignoring demand to build low-engagement tools risks solving
      the wrong problem.
    evidence: [C029, C030, C031, C047, ADHD_Coaching_Survey, Lauder_2024]
    strength: >
      Strong from clinical evidence. Lauder 2024 meta-analysis
      (Tier 1) shows structured psychosocial intervention produces
      the largest workplace effect sizes — practitioners recommend
      it because it works with a human. The counter's weakness:
      no evidence exists for software replicating the human
      accountability function that makes structured intervention
      effective. The AI-accountability hypothesis is plausible but
      entirely untested. If AI cannot replicate the active
      ingredient, following demand repeats the structural failure
      that fills the app graveyard.
  refs:
    sources: [Lauder_2024, ADHD_Coaching_Survey]
    depends_on: [C029, C040, C047]
    entities: [CC03, M7]
  comments: >
    This thesis and C062 are a pair: C060 says demand points the
    wrong way, C062 says the alternative direction (passive models)
    can work. If C060 is wrong (demand IS accurate), then C062
    becomes less important because the right strategy is to solve
    the software-delivery-of-structured-intervention problem.
    Developed from STG_005 candidate "Demand signal is misleading."

C061:
  type: claim
  group: thesis
  draft_review: true
  confidence: 3.0
  statement: >
    Conventional product discovery and validation methods produce
    systematically unreliable signals when applied to ADHD workplace
    tools. Users cannot specify desired features (CC03/C040). Early
    engagement metrics are inflated by novelty (MC6). Standard
    retention metrics cannot distinguish genuine value from novelty
    engagement. A/B testing with typical time horizons cannot detect
    meta-challenge effects that manifest over weeks to months.
  counter_thesis:
    statement: >
      Product methodology challenges are not unique to ADHD. All
      health and behavioural-change products face the same issues:
      users cannot specify needs, novelty inflates early metrics,
      and long-term outcomes require extended measurement windows.
      Digital health, addiction recovery, mental health, and chronic
      disease management have developed validated methodological
      frameworks addressing these challenges: longitudinal cohort
      studies, clinical-grade outcome measures, 90-day retention
      windows, and clinical trial-style evaluation. The methodology
      is not degraded — it is harder, and established health-tech
      practices handle the increased difficulty.
    evidence: [P2A_Community_Reports, C040, C034, C053]
    strength: >
      The health-tech parallel is reasonable but collapses under
      ADHD-specific constraints. Standard health-tech methodology
      assumes sustained study participation — ADHD undermines this
      at the protocol level. A 90-day retention window requires 90
      days of consistent tool use by a population whose signature
      characteristic is inconsistent engagement. Longitudinal cohort
      studies require participants to remember to log data, attend
      check-ins, and complete surveys — prospective memory failure
      creates systematic attrition bias that corrupts the very
      measurements meant to assess the tool. The novelty-engagement
      inflation (MC6) is not generic "early enthusiasm" — it is a
      neurologically-driven dopamine response that produces weeks
      of genuinely high engagement followed by precipitous collapse,
      mimicking product-market fit when none exists. A/B tests with
      standard time horizons cannot distinguish this from real
      retention because the collapse window (4-12 weeks per C034)
      exceeds typical test durations. The "missing wish-list"
      problem (C040/CC03) is also more severe than generic user-
      need elicitation difficulty — ADHD users structurally cannot
      describe what they need because they cannot observe their own
      failure patterns in real time. Counter retains force where
      these ADHD-specific severity claims lack quantitative evidence
      comparing ADHD populations to other health-tech cohorts. The
      assertion that ADHD novelty collapse is WORSE than general
      health-tech engagement decline is plausible but unproven.
  refs:
    depends_on: [C040, C034, C053]
    entities: [CC03, MC6]
  comments: >
    If this thesis is wrong, the build approach is straightforward:
    use established health-tech product methodology. If correct,
    the team needs to develop ADHD-specific validation methods
    before trusting any product signal. This affects timeline,
    resource allocation, and the confidence placed in early results.
    Developed from STG_005 candidate "Standard product methodology
    is degraded."

C062:
  type: claim
  group: thesis
  draft_review: true
  confidence: 4.0
  statement: >
    Product architectures that minimise user-initiated effort and
    eliminate habit-formation dependency — passive capture, ambient
    monitoring, workflow-embedded delivery — can deliver meaningful
    workplace functional improvement for ADHD adults. This is the
    core untested architectural assumption: that capturing
    information and delivering structure passively can substitute
    for the active engagement that clinical evidence shows is
    effective when human-delivered.
  counter_thesis:
    statement: >
      Passive tools can capture and deliver information, but
      meaningful functional improvement requires the user to change
      behaviour, which requires active engagement. Meeting
      transcription captures what was said but does not help the
      user retain it or act on commitments. Email summaries identify
      action items but do not overcome the activation barrier to
      completing them. The gap between information delivery and
      behavioural change is the gap between passive capture and
      functional improvement. All clinical evidence for ADHD
      workplace improvement involves active, structured, human-
      delivered intervention. Passive tools may reduce symptom
      burden through external tracking but cannot build the
      executive function capacity that generates lasting improvement.
    evidence: [C030, C031, C034, C053, Lauder_2024, WorkMAP_RCT]
    strength: >
      This is the strongest counter-thesis in the set. ALL clinical
      evidence for workplace improvement involves active, structured
      intervention delivered by humans. No evidence exists for
      passive-delivery functional improvement — the entire passive
      engagement model is an architectural hypothesis, not an
      evidence-supported approach. The information-to-action gap
      is real and well-documented across health-tech. However: the
      counter rests on defining "functional improvement" as
      capacity-building. If improvement is redefined as "fewer
      missed commitments regardless of whether executive function
      has changed," passive capture delivers it through external
      compensation rather than internal development. Whether
      compensated function counts as meaningful improvement is
      a definitional question the evidence cannot resolve.
  refs:
    sources: [Lauder_2024, WorkMAP_RCT]
    depends_on: [C028, C034, C048, C053]
    entities: [M1, M2, M6]
  comments: >
    The most strategically critical thesis. If passive models
    cannot deliver improvement, the low-MC-vulnerability engagement
    models do not work, and the team faces either (a) the high-MC-
    vulnerability design space or (b) a fundamentally different
    approach. Paired with C060: if demand signal is misleading
    AND passive models can work, the strategy is clear. If demand
    signal is accurate OR passive models fail, the strategy must
    change. Developed from STG_005 candidate "Passive engagement
    can substitute for active engagement."

C063:
  type: claim
  group: thesis
  draft_review: true
  confidence: 3.0
  statement: >
    A software product targeting individual ADHD adults is the most
    effective and viable intervention point for workplace functional
    impairment — as opposed to employer-directed accommodation,
    managerial training, organisational policy change, or clinical
    service delivery.
  counter_thesis:
    statement: >
      Organisational-level intervention may be more effective than
      individual-level tools. The strongest evidence for workplace
      improvement (Work-MAP RCT) involved employer-facilitated
      occupational therapy, not individual software use. Universal
      workplace design changes (flexible scheduling, written
      communication preferences, structured meetings) address the
      environment rather than the individual, do not require the
      individual to maintain a tool, and benefit all employees.
      The disclosure barrier (MC4) that blocks individual ADHD tool
      adoption does not apply to universal workplace changes.
      Enterprise "neurodiverse workplace" initiatives may be the
      more natural and scalable intervention point.
    evidence: [WorkMAP_RCT, C031, C039]
    strength: >
      The Work-MAP RCT (Tier 1) delivered intervention through an
      employer-facilitated pathway. Universal workplace design
      changes sidestep MC4 entirely and have no retention risk.
      The counter weakens where organisational change is slow,
      politically constrained, and outside the control of the
      affected individual. An individual tool deploys without
      employer buy-in — a significant advantage for a population
      where 20-40% may not disclose. Also, organisational
      approaches do not address the cross-domain nature of ADHD
      impairment (C039) — workplace policy changes do not help
      at home.
  refs:
    sources: [WorkMAP_RCT]
    depends_on: [C031, C039, C041]
    entities: [MC4]
  comments: >
    Not in original STG_005 candidates — identified as a gap
    during thesis development. Gate 2 (Individual Addressability)
    shows individual-level intervention is POSSIBLE, but "possible"
    and "optimal" are different claims. If this thesis is wrong,
    the product model shifts from individual tool to employer/
    enterprise platform or clinical delivery vehicle. Affects
    go-to-market, pricing, and fundamental product architecture.

C064:
  type: claim
  group: thesis
  draft_review: true
  confidence: 4.0
  statement: >
    A sustainable business can be built around ADHD workplace tools
    despite the population's structural retention challenges. The
    unit economics question: can you charge enough, to enough people,
    with the retention profile this population produces, to sustain
    the R&D investment that mechanism-aware, meta-challenge-resistant
    product design requires? The addressable market ($2-2.4B ADHD
    apps, 11-16% CAGR) is large enough IF retention economics
    differ from the pattern that has killed previous attempts. This
    thesis depends on C062 (passive engagement model works) and
    C055 (architectural differentiation is real) — if those hold,
    the retention profile changes and the business model becomes
    viable.
  counter_thesis:
    statement: >
      ADHD tool unit economics are structurally broken and no
      architectural innovation changes this. B2C acquisition costs
      are high (ADHD users are difficult to reach without clinical
      channels or ADHD-community marketing, both of which are
      expensive or ethically constrained). Willingness to pay is
      low (the population skews toward free tools — P2D shows most
      ADHD apps are freemium with low conversion). Churn is high
      and driven by neurology, not product quality — novelty
      collapse (MC6) produces 4-12 week retention cliffs regardless
      of the engagement model. Enterprise distribution is blocked
      by MC4 (disclosure barrier). The existing ADHD app landscape
      (Tiimo, Llama Life, Focusmate) demonstrates the ceiling:
      small, niche, lifestyle-business scale. No amount of
      architectural sophistication changes the fundamental unit
      economics of serving a population whose defining
      characteristic makes sustained subscription revenue difficult.
    evidence: [C034, C049, C053, P2A_Community_Reports]
    strength: >
      The "structural unit economics" argument is the strongest
      counter-thesis element. Novelty collapse (MC6) producing
      4-12 week retention cliffs (C034) directly undermines
      subscription revenue models. The disclosure barrier (MC4)
      constraining enterprise distribution is well-evidenced.
      Existing market evidence (P2D landscape — 54 apps, none
      well-funded) is consistent with a genuinely low ceiling
      rather than market mispricing. Counter weakens IF passive
      engagement models (C062) produce fundamentally different
      retention curves — a tool that works without user-initiated
      engagement does not face novelty collapse in the same way
      because the user never formed the habit that collapses. Also
      weakens if the value delivery is high enough to justify
      premium pricing ($20-50/month) from a smaller, highly
      retained segment rather than mass-market freemium. But both
      of these mitigants are hypotheses, not evidence. This thesis
      has the highest dependency on other theses being correct and
      the least independent evidence.
  refs:
    depends_on: [C034, C049, C053, C055, C062]
    entities: [MC4, MC6]
  comments: >
    Not in original STG_005 candidates — identified during steel-
    man review as a critical coverage gap. Market data (market size,
    CAGR, competitive landscape) is from S10 synthesis and P2D
    landscape analysis, not encoded as formal claims. This thesis
    sits at the intersection of research evidence and business
    analysis. If this thesis is wrong, the research findings are
    still valid but the commercial path is not individual B2C/B2B
    SaaS — it may be clinical delivery, employer procurement, or
    research licensing. Heavy dependency chain: C064 depends on
    C062 (passive works) which depends on C055 (architecture
    matters) which depends on C054 (problem is real). If any link
    breaks, the unit economics thesis is undermined.


