# ═══════════════════════════════════════════════════════════════
# SOURCES
# Bibliography of original cited research and evidence.
# Claims reference these source IDs.
# ═══════════════════════════════════════════════════════════════

Fuermaier_2021:
  type: source
  name: "Fuermaier et al., 2021 — ADHD at the Workplace (WFIRS)"
  description: >
    German outpatient study using Weiss Functional Impairment
    Rating Scale. n=134 ADHD adults vs matched controls and
    general community sample. Primary source for WFIRS work
    item prevalence data.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8295111/
  analysis_docs: [P1A, P1C]
  limitations: >
    Clinical outpatient sample — may over-represent impairment
    vs community ADHD population. German sample — cultural
    context may affect workplace norms.

deGraaf_2008:
  type: source
  name: "de Graaf et al., 2008 — WHO World Mental Health Survey"
  description: >
    WHO survey of 7,075 workers across 10 countries measuring
    productivity loss (presenteeism and absenteeism) in workers
    with ADHD. Source of the 22.1 extra lost days figure.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC2665789/
  analysis_docs: [P1A]
  limitations: >
    Self-report measure of role performance. "Lost days" are
    estimated equivalents, not direct observation.

Swedish_Population_2021:
  type: source
  name: "Swedish population cohort, 2021 — Employment outcomes"
  description: >
    Population register study. N=~64,000 including 9,718 ADHD,
    48,590 controls, 5,582 siblings. Source of 10.2x disability
    pension risk, 2.7x long-term sickness absence risk.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10009402/
  analysis_docs: [P1A, P1C]
  limitations: >
    Register-based diagnoses — captures treated ADHD, may miss
    undiagnosed individuals. Swedish welfare system context.

Barkley_Murphy_2010:
  type: source
  name: "Barkley & Murphy, 2010 — Occupational functioning in ADHD"
  description: >
    Structured occupational history interviews. Documented
    higher rates of jobs quit, formal discipline, interpersonal
    trouble, and impaired employer ratings in ADHD adults.
    Cited by 751+ papers.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://academic.oup.com/acn/article/25/3/157/3840
  analysis_docs: [P1A, P1C]
  limitations: >
    Retrospective occupational history — subject to recall bias.

Adamou_2013:
  type: source
  name: "Adamou et al., 2013 — Occupational health consensus"
  description: >
    International occupational health consensus concluding ADHD
    causes impairment "in all aspects related to employment."
    Safety risk documentation.
  source_type: consensus_statement
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC3599848/
  analysis_docs: [P1A]
  limitations: >
    Consensus statement — reflects expert opinion at time of
    publication.

Norwegian_Employment_Study:
  type: source
  name: "Norwegian study — Inattention and employment status"
  description: >
    N=149. Found inattention significantly predicted employment
    status while hyperactivity/impulsivity, comorbidities, and
    demographics did not. Inattention correlations r=0.40-0.60
    with work problems.
  source_type: clinical_study
  evidence_tier: Tier 1-2
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC12128943/
  analysis_docs: [P1C]
  limitations: >
    Smaller sample (n=149). Single-country context.

Burnout_Mediation_2024:
  type: source
  name: "Job burnout mediation study, 2024 — EF deficit pathways"
  description: >
    Field study of 171 employees. Identified self-management
    to time as the most significant executive function deficit
    mediating the ADHD → burnout relationship.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC11007411/
  analysis_docs: [P1C, P2C]
  limitations: >
    Mediation analysis — identifies pathways but the specific
    mediators tested may not be exhaustive. Emotional regulation
    was not included as a mediator variable.

Alderson_2020:
  type: source
  name: "Alderson et al., 2020 — Working memory bifactor model"
  description: >
    Bifactor modelling of working memory deficits in ADHD.
    Effect sizes d=1.63-2.03, with 75-81% of ADHD individuals
    showing measurable impairment in central executive WM.
  source_type: meta_analysis
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC7483636/
  analysis_docs: [P3B]
  limitations: >
    Meta-analytic — aggregates across studies with varying
    methods and populations.

Missonnier_2013:
  type: source
  name: "Missonnier et al., 2013 — Encoding deficit neural evidence"
  description: >
    First neural evidence of impaired encoding in adult ADHD.
    Lower P3 amplitude during working memory encoding stage,
    indicating ineffective attentional resource allocation.
    Published in Clinical Neurophysiology.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.sciencedirect.com/science/article/abs/pii/S1388245713013485
  analysis_docs: [P3B]
  limitations: >
    Neural study — sample size not noted in our documents.
    Measures neural correlates, not directly workplace behaviour.

Bonilla_2020:
  type: source
  name: "Bonilla et al., 2020 — WM encoding/retrieval in ADHD"
  description: >
    Confirmed that while binding processes are intact, attention-
    related encoding and retrieval processes are compromised in
    ADHD. Published in Scientific Reports.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.nature.com/articles/s41598-020-64678-x
  analysis_docs: [P3B]
  limitations: >
    Laboratory task — ecological validity for workplace meetings
    is inferred, not directly measured.

Fuermaier_2013:
  type: source
  name: "Fuermaier et al., 2013 — Prospective memory in ADHD"
  description: >
    Large-scale impairment in task planning abilities. 45 ADHD
    adults vs 45 matched controls. Published in PLOS ONE.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0058338
  analysis_docs: [P3B]
  limitations: >
    Relatively small sample (n=90 total).

Fuermaier_2016:
  type: source
  name: "Fuermaier et al., 2016 — Methylphenidate effects on memory"
  description: >
    Found medication improves memory but leaves considerable
    impairments vs normal functioning. Large deficits persist
    in story recall and prospective memory even when treated.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://www.tandfonline.com/doi/full/10.1080/23279095.2015.1124108
  analysis_docs: [P3B, S10]
  limitations: >
    Single medication (methylphenidate). Other medications may
    show different effects.

Lauder_2024:
  type: source
  name: "Lauder et al., 2024 — Meta-analysis of workplace interventions"
  description: >
    Meta-analysis comparing pharmacological (d=0.19) and
    psychosocial (d=0.56) interventions on work-relevant
    outcomes for adults with ADHD. Psychosocial interventions
    showed significantly larger effects.
  source_type: meta_analysis
  evidence_tier: Tier 1
  url: https://journals.sagepub.com/doi/10.1177/27546330241292984
  analysis_docs: [P2C]
  limitations: >
    Meta-analytic — pooled effect sizes may mask heterogeneity.
    Work-relevant outcomes defined broadly.

WorkMAP_RCT:
  type: source
  name: "Grinblat & Rosenblum, 2023 — Work-MAP telehealth RCT"
  description: >
    Randomised controlled trial of telehealth metacognitive
    intervention for adults with ADHD. 11 weekly sessions.
    15-19% of participants improved EF scores from abnormal to
    normal range, sustained at 3-month follow-up.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10336612/
  analysis_docs: [P2C]
  limitations: >
    Structured therapeutic programme with clinician — not
    directly comparable to software-delivered intervention.

Medication_Adherence_2024:
  type: source
  name: "Medication adherence observational study (n=4,011)"
  description: >
    Found average medication adherence of 56%, with only 27.5%
    meeting the 80% coverage threshold for therapeutic benefit.
  source_type: clinical_study
  evidence_tier: Tier 1
  url: "Pubmed: 40357727"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Single observational study. Adherence patterns may vary
    by medication type and healthcare system.

Medication_Discontinuation_2024:
  type: source
  name: "Karolinska Institutet, 2024 — Multinational discontinuation"
  description: >
    Multinational study of 1.2M patients across 9 countries.
    Found 50-70% of adolescents and adults discontinue ADHD
    medication within the first year.
  source_type: population_cohort
  evidence_tier: Tier 1
  url: "Karolinska Institutet, 2024"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Register-based data. Reasons for discontinuation not
    captured.

Digital_Intervention_Dropout:
  type: source
  name: "Pettersson et al., 2017 / Nordby et al., 2022 — Digital intervention dropout"
  description: >
    77% of ADHD adults did not complete self-guided digital
    interventions. In broader self-guided interventions, >90%
    drop out after 2 modules in open-distribution versions.
    Cited in Frontiers in Digital Health.
  source_type: meta_analysis
  evidence_tier: Tier 1-2
  url: "Nordby et al. 2022, Frontiers in Digital Health"
  analysis_docs: [Meta_Challenges]
  limitations: >
    Self-guided only — coached digital interventions may have
    better completion. The >90% figure is for depression
    interventions, not ADHD-specific.

P2A_Community_Reports:
  type: source
  name: "ADHD community self-reports (Reddit, ADDitude, forums)"
  description: >
    User-reported workplace struggles from r/ADHD, r/ADHD_
    Programmers, ADDitude Magazine surveys, and ADHD community
    forums. Source of qualitative descriptions like "invisible
    barrier," "app graveyard," and "out of sight, out of mind."
  source_type: user_evidence
  evidence_tier: Tier 3
  url: "Multiple community sources"
  analysis_docs: [P2A, P2B]
  limitations: >
    Self-selected. No diagnosis verification. Recall bias.
    Frustration likely over-represented. Not generalisable
    to the ADHD population as a whole.

ADDitude_Poll:
  type: source
  name: "ADDitude Magazine workplace challenges poll (n=~1,000)"
  description: >
    Survey of ~1,000 ADHD adults on biggest work challenges.
    29.27% cited focusing consistently as #1, 21.86% cited
    prioritisation.
  source_type: user_evidence
  evidence_tier: Tier 3
  url: "ADDitude Magazine"
  analysis_docs: [P2A]
  limitations: >
    Self-selected readership. Likely skews toward diagnosed,
    treatment-seeking adults.

ADHD_Coaching_Survey:
  type: source
  name: "ADHD coaching workforce survey"
  description: >
    Found 72.7% of ADHD coaches self-identify as having or
    suspecting ADHD. 60.9% began practicing during/after COVID.
    98.9% use lived experience to inform services.
  source_type: practitioner_study
  evidence_tier: Tier 2
  url: "Cited in P2C"
  analysis_docs: [P2C]
  limitations: >
    Self-report from practitioners. Coach qualifications and
    methodologies vary widely.


# ═══════════════════════════════════════════════════════════════
# CLAIMS
# Evidence statements with typed relationships.
# The evidence base for the entire system of record.
# ═══════════════════════════════════════════════════════════════

C001:
  type: claim
  confidence: 1.0
  statement: >
    Adults with ADHD show clusters of observable problems across
    productivity, time management, reliability, interpersonal
    behaviour and safety simultaneously, with more than 80%
    reporting at least one significant work problem and ~60%
    reporting three or more distinct problems.
  refs:
    sources: [Fuermaier_2021]
  comments: >
    German outpatient sample (n=134) using WFIRS scale.
    Foundational claim establishing multi-domain impairment.

C002:
  type: claim
  confidence: 1.0
  statement: >
    Workers with ADHD lose 22.1 extra days per year of role
    performance versus similar workers without ADHD, with more
    than half the total loss occurring on days the worker is
    present (presenteeism), not absent.
  refs:
    sources: [deGraaf_2008]
  comments: >
    WHO World Mental Health Survey, 7,075 workers across 10
    countries. The presenteeism finding is significant — the
    problem is not absence but reduced output while present.

C003:
  type: claim
  confidence: 1.0
  statement: >
    Adults with ADHD have a 10-fold higher risk of disability
    pension and only 22-24% employment rates versus 72-79% in
    control populations, consistent across Norwegian and Swedish
    population cohorts.
  refs:
    sources: [Swedish_Population_2021, Norwegian_Employment_Study]
    challenged_by: [C004]
  comments: >
    Swedish cohort N=~64,000 (including 9,718 ADHD); Norwegian
    clinical sample. These are endpoint data showing labour
    market exit, not just difficulty.

C004:
  type: claim
  confidence: 1.0
  statement: >
    The most common self-reported work impairment (69%) is
    "problems working to your potential" — an internal sense of
    underperformance — while actual termination rates are lower
    (20-23%), suggesting many ADHD adults experience their
    performance as worse than employers perceive it.
  refs:
    sources: [Fuermaier_2021, Barkley_Murphy_2010]
    challenged_by: [C005]
  comments: >
    WFIRS item #10 from Fuermaier; termination data from
    Barkley & Murphy occupational history. The gap between
    subjective distress and objective job loss matters for
    product design.

C005:
  type: claim
  confidence: 1.0
  statement: >
    Even when blinded to ADHD diagnosis, employers rate ADHD
    employees as having significantly greater inattentiveness,
    poor punctuality, time management problems, and overall
    poorer work performance than controls.
  refs:
    sources: [Barkley_Murphy_2010]
  comments: >
    Validates that impairment is observable, not just self-
    perceived. Partially qualifies C004 — the gap between
    self-report and employer perception may be smaller than
    the internal/external framing suggests.

C006:
  type: claim
  confidence: 1.5
  statement: >
    Inattention symptoms show the strongest correlations
    (r=0.40-0.60) with work problems across both community and
    clinical samples. Inattention significantly predicts
    employment status while hyperactivity/impulsivity,
    comorbidities, and demographics do not.
  refs:
    sources: [Norwegian_Employment_Study]
  comments: >
    N=149, multivariate analysis. This is why the mechanism
    layer focuses on attention allocation, not hyperactivity.

C007:
  type: claim
  confidence: 1.0
  statement: >
    Objective cognitive tests account for little variance in
    workplace functioning; self-reported everyday behaviours
    predict work outcomes much better.
  refs:
    sources: [Barkley_Murphy_2010]
  comments: >
    Drawn from occupational history comparison of neuropsych
    measures versus structured interview data. General finding
    replicated across the ADHD workplace literature — ecological
    validity of laboratory tests is poor.

C008:
  type: claim
  confidence: 3.5
  statement: >
    Time blindness in ADHD is a fundamental difference in time
    perception, not merely poor planning. Standard time
    management tools (calendars, to-do lists) consistently fail
    for ADHD users because they assume an internal time sense
    that does not exist.
  refs:
    sources: [Burnout_Mediation_2024, Fuermaier_2021, P2A_Community_Reports]
    depends_on: [C009]
  comments: >
    Burnout mediation study identified time management as key
    EF deficit; Fuermaier WFIRS data quantified the impairment;
    community reports document consistent tool failure. The
    "assume an internal time sense" framing is our analytical
    interpretation of why tools fail, hence typed as
    interpretation.

C009:
  type: claim
  confidence: 1.0
  statement: >
    Self-management to time was identified as the most
    significant executive function deficit mediating the
    relationship between ADHD and job burnout.
  refs:
    sources: [Burnout_Mediation_2024]
  comments: >
    Field study of 171 employees. Mediation analysis
    identifying time management as the strongest EF pathway
    from ADHD to occupational failure.

C010:
  type: claim
  confidence: 2.5
  statement: >
    Coaches and occupational therapists consistently prioritise
    time management as the foundation for intervention because
    it creates cascading effects: missed deadlines, incomplete
    projects, chronic lateness, and job instability all follow
    from time management deficits.
  refs:
    sources: [ADHD_Coaching_Survey, Burnout_Mediation_2024]
    depends_on: [C009]
  comments: >
    Practitioner consensus on causal ordering, corroborated by
    the mediation study's quantitative identification of time
    management as primary EF mediator.

C011:
  type: claim
  confidence: 3.0
  statement: >
    Task initiation failure in ADHD is qualitatively different
    from procrastination. Users describe an "invisible barrier"
    where they know exactly what to do but cannot start, due to
    altered reward-processing systems. Standard productivity
    advice ("just start") fails because it assumes a functioning
    initiation system.
  refs:
    sources: [P2A_Community_Reports, ADDitude_Poll]
  comments: >
    Community self-reports (Reddit threads) and ADDitude poll
    data on task initiation. The phenomenology ("invisible
    barrier") is directly reported. The causal attribution to
    reward processing is our interpretation, hence the type.

C012:
  type: claim
  confidence: 2.0
  statement: >
    The ADHD brain activates on urgency, novelty, interest,
    challenge, and passion (the INCUP framework) rather than
    importance. Standard importance-based appeals (long-term
    consequences, obligation) are structurally mismatched to
    ADHD activation patterns.
  refs:
    sources: [P2A_Community_Reports, ADHD_Coaching_Survey]
  comments: >
    INCUP framework originates from Dodson's clinical work
    (not a formal study in our bibliography — established
    clinical knowledge). Community reports and practitioner
    data provide the evidence that importance-based tools
    fail in practice. Our contribution is applying the
    framework to product design implications.

C013:
  type: claim
  confidence: 3.0
  statement: >
    Delay discounting is a documented mechanism in ADHD where
    distant rewards lose motivational value exponentially,
    directly causing long-term project neglect despite
    intellectual understanding of importance.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Delay discounting is well-established in ADHD neuroscience
    literature but no specific delay discounting study is in
    our bibliography. The project neglect manifestation is
    evidenced by community reports of long-term task
    abandonment patterns. Consider adding a primary delay
    discounting study if this claim needs strengthening.

C014:
  type: claim
  confidence: 1.0
  statement: >
    Working memory impairment in ADHD shows effect sizes of
    d=1.63-2.03 with 75-81% of individuals showing measurable
    impairment. Neurophysiological evidence shows lower P3
    amplitude during encoding, indicating ineffective
    attentional resource allocation at the encoding stage.
  refs:
    sources: [Alderson_2020, Missonnier_2013]
  comments: >
    Tier 1 clinical evidence. Alderson meta-analysis (effect
    sizes and prevalence), Missonnier study (P3 neural
    evidence). Separates encoding deficit from retrieval
    failure — information never reaches storage.

C015:
  type: claim
  confidence: 3.5
  statement: >
    Meeting memory failure occurs despite active engagement
    and comprehension during the meeting. Users understand
    content in real time but encoding fails silently — users
    cannot recall even the gist afterward.
  refs:
    sources: [Missonnier_2013, Bonilla_2020, P2A_Community_Reports]
    depends_on: [C014]
  comments: >
    Neural evidence (Missonnier, Bonilla) combined with user
    self-reports of the lived experience. The "despite active
    engagement" qualifier is critical — this is not an attention
    problem but an encoding problem.

C016:
  type: claim
  confidence: 1.0
  statement: >
    Medication improves memory performance but leaves
    considerable impairments compared to normal functioning,
    with large deficits persisting in story recall and
    prospective memory even in treated adults with ADHD.
  refs:
    sources: [Fuermaier_2016]
  comments: >
    Methylphenidate study. Key caveat: medication does not
    normalise these deficits. Tools addressing encoding and
    prospective memory are necessary even for medicated
    populations.

C017:
  type: claim
  confidence: 1.0
  statement: >
    Email management failure manifests as reading emails, forming
    intention to reply, then the intention vanishing from
    awareness entirely — the "read and forgot" pattern. One
    user was terminated specifically for failing to send a
    calendar invite.
  refs:
    sources: [Fuermaier_2013, P2A_Community_Reports]
  comments: >
    Fuermaier 2013 documents the prospective memory impairment
    mechanism (d=large, n=90); community reports provide the
    workplace manifestation and employment consequences.

C018:
  type: claim
  confidence: 1.0
  statement: >
    No existing email tool addresses the core ADHD email failure
    mechanism: prospective memory failure for reply intentions.
    All tools focus on inbox volume, processing speed, search,
    or visual overwhelm, but none proactively resurface
    forgotten reply intentions.
  refs:
    sources: [Fuermaier_2013, P2A_Community_Reports]
  comments: >
    Gap analysis: Fuermaier 2013 establishes the prospective
    memory mechanism; community reports document which tool
    features users actually encounter (none addressing PM).
    Typed as interpretation because "no tool" is based on our
    review's coverage, which may not be exhaustive.

C019:
  type: claim
  confidence: 3.0
  statement: >
    The "out of sight, out of mind" pattern is described as
    fundamental by users: "Those apps will NEVER WORK because
    you have to remember to look at them, which you won't."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Direct user quote from r/ADHD_Programmers. This is the
    circular dependency expressed as a prospective memory
    problem — the tool itself becomes subject to the deficit
    it addresses.

C020:
  type: claim
  confidence: 2.0
  statement: >
    The overwhelm-burnout cycle follows a documented pattern:
    time management difficulties → missed deadlines → overtime
    compensation → energy depletion → stress → emotional
    dysregulation increases → performance decline → negative
    feedback → job instability → repeat.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Practitioner-documented cascade pattern reported by
    coaches and occupational therapists. Emotional
    dysregulation is both a component and an amplifier.

C021:
  type: claim
  confidence: 3.0
  statement: >
    Users report standard ADHD strategies as explicitly
    counterproductive: Pomodoro technique interrupts hyperfocus
    and creates "2 opportunities for failure an hour"; starting
    with hardest task requires warm-up that doesn't exist;
    increased pressure causes "brain shutdown."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    The "brain shutdown" under pressure is an emotional
    dysregulation response. The Pomodoro/hardest-task failures
    are reward-processing mismatches. Both are active harm
    from neurotypical-designed tools.

C022:
  type: claim
  confidence: 3.0
  statement: >
    No productivity tool tested by ADHD users shows sustained
    success. Users report setup hyperfocus (spending days
    configuring), followed by abandonment within 3-14 days,
    creating an "app graveyard." Not a single tool shows
    >90-day sustained use in community reports.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Universal pattern across Notion, Todoist, Trello, ClickUp,
    Asana, Habitica, Finch. Structural failure, not incidental.

C023:
  type: claim
  confidence: 1.0
  statement: >
    Five meta-challenges apply universally to any ADHD product:
    Novelty Decay, Circular Dependency, Shame-Avoidance Spiral,
    Disclosure Constraint, and Notification Desensitisation.
  refs:
    sources:
      - P2A_Community_Reports
      - ADHD_Coaching_Survey
      - Medication_Adherence_2024
      - Medication_Discontinuation_2024
      - Digital_Intervention_Dropout
  comments: >
    Our analytical framework, constructed from five evidence
    streams: community reports (novelty decay, circular
    dependency), practitioner data (shame-avoidance, disclosure
    constraint), and clinical studies (medication adherence and
    digital intervention dropout as baseline comparators for
    notification desensitisation and novelty decay). The
    grouping into five named challenges is our construction;
    each individual challenge traces to specific evidence.

C024:
  type: claim
  confidence: 1.0
  statement: >
    ADHD medication adherence averages 56%, with only 27.5%
    meeting the 80% coverage threshold, and 50-70% discontinuing
    within the first year. If the gold-standard intervention
    fails retention, digital tools should expect equal or worse.
  refs:
    sources: [Medication_Adherence_2024, Medication_Discontinuation_2024]
  comments: >
    Two studies: adherence study (n=4,011) for the 56% and
    27.5% figures; Karolinska multinational study (1.2M
    patients, 9 countries) for the 50-70% discontinuation
    figure. The final sentence is our interpretation.

C025:
  type: claim
  confidence: 1.5
  statement: >
    77% of ADHD adults did not complete self-guided digital
    interventions in a meta-analysis of treatment dropout.
    More than 90% drop out after 2 modules in open-distribution
    self-guided interventions.
  refs:
    sources: [Digital_Intervention_Dropout]
  comments: >
    Pettersson et al. 2017 / Nordby et al. 2022. The >90%
    figure is from broader self-guided interventions (not
    ADHD-specific). This distinction matters for applying the
    dropout rate to ADHD-specific products.

C026:
  type: claim
  confidence: 2.0
  statement: >
    Both coaches and OTs report that ADHD adults face a
    consistent disclosure dilemma at work: fear of
    discrimination, uncertainty about whether disclosure helps,
    managers who don't know how to respond, and lack of
    organisational ADHD understanding.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Practitioner-reported pattern. Products must work without
    requiring the user to explain or justify their ADHD to
    colleagues.

C027:
  type: claim
  confidence: 3.0
  statement: >
    Users want tools that "intervene before we get stuck, not
    assistants waiting for us to remember to ask."
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    Direct user quote. Explicit demand for product-initiated
    intervention over user-initiated tools.

C028:
  type: claim
  confidence: 1.0
  statement: >
    Passive Capture and Structured Delivery has zero habit-
    formation burden and the strongest retention profile because
    the user changes nothing about how they work. Value
    compounds over time as the knowledge graph grows.
  refs:
    sources: [P2A_Community_Reports, Fuermaier_2013]
  comments: >
    Community reports provide the evidence base (tool
    abandonment patterns, habit-formation as failure point);
    Fuermaier 2013 establishes why prospective memory burden
    predicts failure. The retention and compounding claims are
    hypothesised from these structural characteristics, not
    observed in longitudinal data.

C029:
  type: claim
  confidence: 2.0
  statement: >
    Structured Check-In / Guided Routine is the model most
    recommended by practitioners and most abandoned by users.
    It has the worst meta-challenge vulnerability profile of
    any engagement model.
  refs:
    sources: [ADHD_Coaching_Survey, P2A_Community_Reports]
    challenged_by: [C030]
  comments: >
    Practitioner recommendation from coaching survey;
    abandonment from community data. The paradox is explained
    by practitioners providing external accountability that
    software cannot replicate.

C030:
  type: claim
  confidence: 1.0
  statement: >
    Psychosocial interventions (particularly CBT) show
    significantly larger effects (d=0.56) on work-relevant
    outcomes than pharmacological interventions (d=0.19) in
    a 2024 meta-analysis of adult ADHD workplace outcomes.
  refs:
    sources: [Lauder_2024]
  comments: >
    Tier 1 meta-analysis. Partially qualifies C029 — structured
    interventions DO work, but the evidence is for human-
    delivered structured interventions, not software-delivered.

C031:
  type: claim
  confidence: 1.0
  statement: >
    ADHD coaching/OT interventions incorporating external
    structure, accountability, and client-selected goals show
    15-19% improvement in executive function scores from
    abnormal to normal range, sustained at 3-month follow-up.
  refs:
    sources: [WorkMAP_RCT]
  comments: >
    Randomised controlled trial (Tier 1). 11 weekly telehealth
    sessions. External structure is clinically effective. The
    question is whether software can deliver "external structure"
    without the human.

C032:
  type: claim
  confidence: 1.0
  statement: >
    No single engagement model addresses all problem clusters
    at the "strongly compatible" level. Any product addressing
    the full problem space requires combining multiple
    engagement models.
  refs:
    sources: [Fuermaier_2021, P2A_Community_Reports, ADHD_Coaching_Survey, Lauder_2024]
  comments: >
    Derived from our compatibility analysis, which synthesizes
    across clinical evidence (Fuermaier — problem breadth),
    community data (tool failure patterns), practitioner
    reports (intervention modalities), and the Lauder meta-
    analysis (intervention effect sizes by type). The
    conclusion that no single model covers all clusters is
    structural, not directly measured.

C033:
  type: claim
  confidence: 1.0
  statement: >
    ADHD is heterogeneous. The same engagement model may work
    well for one profile (primarily inattentive) and poorly
    for another (primarily hyperactive/impulsive, combined).
    The research does not differentiate engagement patterns
    by ADHD subtype.
  refs:
    sources: [Fuermaier_2021, Norwegian_Employment_Study]
  comments: >
    Both studies note sample composition and the inattentive-
    predominant finding (C006), but neither differentiates
    engagement or intervention response by subtype. ADHD
    heterogeneity is universally acknowledged in the clinical
    literature.

C034:
  type: claim
  confidence: 3.0
  statement: >
    Engagement model retention profiles are hypothesised based
    on structural characteristics, not observed in longitudinal
    data. The "app graveyard" evidence provides negative data
    on Structured Check-In but limited positive data on other
    models.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    The positive evidence for tool abandonment is strong
    (community data on the failure case). The absence of
    longitudinal retention data for alternative models is
    the caveat — our retention predictions are structural
    inferences, not measurements.

C035:
  type: claim
  confidence: 2.0
  statement: >
    Most ADHD coaching workforce (72.7%) self-identifies as
    having or suspecting ADHD, with 98.9% using lived
    experience to inform services. This creates both credibility
    (lived experience) and potential methodological bias.
  refs:
    sources: [ADHD_Coaching_Survey]
  comments: >
    Affects interpretation of all practitioner evidence.
    Coaches may recommend strategies that work for their own
    neurotype. The population they serve may not be
    representative.

C036:
  type: claim
  confidence: 2.5
  statement: >
    Deadline misses (FP04) receive causal pressure from both time
    blindness (insufficient time allocated) and focus failure
    (insufficient output produced). Eliminating deadline misses
    likely requires addressing both upstream causes simultaneously.
  refs:
    depends_on: [C008, C006]
  comments: >
    Convergence claim from cluster analysis. FP04 sits at the
    intersection of CL_A (time-based) and CL_C (focus-based)
    clusters.
  derived_from: Our_S4

C037:
  type: claim
  confidence: 2.5
  statement: >
    Long-term project neglect (FP08) receives causal pressure from
    both time blindness (delay discounting compresses time horizon)
    and initiation failure (activation energy highest for low-urgency
    work). Effective intervention likely requires addressing both
    upstream causes simultaneously.
  refs:
    depends_on: [C008, C011]
  comments: >
    Convergence claim from cluster analysis. FP08 sits at the
    intersection of CL_A (time-based) and CL_B (activation-based)
    clusters.
  derived_from: Our_S4

C038:
  type: claim
  confidence: 2.0
  statement: >
    Co-occurring neurodevelopmental conditions (autism, dyslexia,
    dyscalculia, anxiety) substantially change the functional
    profile of ADHD at work. Interview data shows 7/12 ADHD adults
    had co-occurring conditions, and practitioners emphasise that
    ADHD-plus-dyslexia and ADHD-plus-autism produce qualitatively
    different functional patterns.
  refs:
    sources: [Fuermaier_2021, ADHD_Coaching_Survey]
  comments: >
    Comorbidity prevalence from P2E interviews (n=12). Practitioner
    emphasis from P2E (Andrew). WFIRS data (Fuermaier) shows variable
    profiles consistent with comorbidity-driven differences.
  derived_from: Our_KG

C039:
  type: claim
  confidence: 1.0
  statement: >
    ADHD functional problems do not confine to work — the same
    mechanisms that cause task initiation failure at work operate
    across domestic and social contexts. Users do not separate
    "work ADHD" from "life ADHD" and describe struggles spanning
    domains without distinction.
  refs:
    sources: [Fuermaier_2021, P2A_Community_Reports]
  comments: >
    WFIRS explicitly measures impairment across multiple life
    domains (not work-only). P2I community evidence and P2E
    interviews confirm cross-domain spillover as consistent
    pattern.
  derived_from: Our_KG

C040:
  type: claim
  confidence: 3.0
  statement: >
    ADHD users can articulate functional pain in vivid detail but
    struggle to describe what a solution would look like. Wishlists
    tend to restate the problem rather than specify tool features.
    Standard "what would you want?" research questions yield vague
    responses.
  refs:
    sources: [P2A_Community_Reports]
  comments: >
    P2E interview evidence (Sarah: unable to specify what "one"
    looks like). P2I/P2G community wishlists describe pain relief
    rather than specific mechanisms. Implies behavioural observation
    outweighs stated preference for feature discovery.
  derived_from: Our_KG

C041:
  type: claim
  confidence: 1.0
  statement: >
    Medication reduces but does not resolve functional workplace
    problems. Adults on medication still experience the full range
    of functional failures, sometimes at reduced intensity.
    Workplace accommodations provide additional benefit beyond
    medication alone.
  refs:
    sources: [WorkMAP_RCT, P2A_Community_Reports]
  comments: >
    Work-MAP RCT showed accommodation benefits beyond medication.
    P2A/P2E: medicated users still report all major functional
    problems. Medication is not an alternative to structural support.
  derived_from: Our_KG

C042:
  type: claim
  confidence: 1.5
  statement: >
    No engagement model is strongly compatible with all six
    problem areas. Any product addressing the full problem space
    requires combining multiple engagement models. A single-model
    product will likely leave gaps in coverage.
  refs:
    depends_on: [C032]
  comments: >
    Affects product architecture decisions and scope/sequencing
    decisions.
  derived_from: Our_CS2

C043:
  type: claim
  confidence: 3.5
  statement: >
    Models where the product comes to the user (M1, M2, M6)
    are consistently less vulnerable to bootstrapping (MC2)
    and notification desensitisation (MC5) than models requiring
    user initiation (M3, M5, M7, M8). This appears to be a
    structural characteristic rather than a design detail.
  refs:
    depends_on: [C019, C022, C025, C027]
  comments: >
    Affects engagement model prioritisation and architecture
    decisions (push vs pull).
  derived_from: Our_CS2

C044:
  type: claim
  confidence: 3.5
  statement: >
    Models that become more valuable over time (M2's knowledge
    graph, M5's calibration data, M4's pattern learning) are
    more resistant to novelty decay (MC1) than models delivering
    fixed-value interactions (M7's check-in, M3's recording).
    Compounding value may create switching cost that counteracts
    the tendency toward disengagement.
  refs:
    depends_on: [C022, C024, C028]
  comments: >
    Affects retention strategy and build sequencing (compound-value
    components first).
  derived_from: Our_CS2

C045:
  type: claim
  confidence: 3.5
  statement: >
    Models that operate in the background (M1, M2, M6) are
    simultaneously resistant to shame (nothing to fall behind
    on) and disclosure (nothing visible to colleagues).
    Foreground models (M3, M5, M7) generate both shame
    artefacts and workplace visibility. Both constraints may
    be addressable through a single architectural choice.
  refs:
    depends_on: [C020, C022, C026]
  comments: >
    Affects architecture decisions (background vs foreground)
    and enterprise/workplace deployment strategy.
  derived_from: Our_CS2

C046:
  type: claim
  confidence: 3.5
  statement: >
    Push-based delivery mitigates bootstrapping (MC2) but
    creates notification desensitisation vulnerability (MC5).
    Pull-based delivery avoids MC5 but creates MC2 vulnerability.
    One potential resolution is embedding in existing workflows
    rather than using either push or pull as primary delivery —
    the ambient presence pattern (M2, M6).
  refs:
    depends_on: [C019, C025]
  comments: >
    Affects notification/delivery architecture and integration
    strategy.
  derived_from: Our_CS2

C047:
  type: claim
  confidence: 2.5
  statement: >
    Structured Check-In (M7) has strong practitioner endorsement
    alongside the weakest meta-challenge profile in our analysis.
    Practitioners provide external accountability that makes
    check-ins work — the practitioner IS the bootstrapping
    mechanism, the shame regulator, and the novelty source.
    These functions may be difficult to replicate in software
    alone.
  refs:
    depends_on: [C029, C030, C031]
  comments: >
    Affects whether to include structured check-in at all and
    human-in-loop vs pure software decisions.
  derived_from: Our_CS2

C048:
  type: claim
  confidence: 4.0
  statement: >
    Passive Capture (M2) shows fewer high vulnerabilities in our
    analysis and strong clinical evidence (Tier 1 encoding/PM
    data), but is strongly compatible with only 2 of 6 problem
    areas (FP07, FP09). The broadest model (M1 Ambient Monitor)
    has weaker evidence and high privacy requirements. The models
    with stronger evidence tend to address fewer problem areas.
  refs:
    depends_on: [C014, C015, C017, C028]
  comments: >
    Affects product scope decisions and evidence-based vs
    coverage-based prioritisation.
  derived_from: Our_CS2

C049:
  type: claim
  confidence: 2.0
  statement: >
    If 56% medication adherence and 50-70% first-year
    discontinuation are the baseline for the gold-standard
    intervention, digital tools may face similar or worse
    retention challenges. Any retention claim for a digital
    product that assumes better retention than medication needs
    strong justification. This reframes retention as "how do
    we deliver value assuming poor retention."
  refs:
    depends_on: [C024, C025]
  comments: >
    Affects retention strategy and value delivery architecture
    (front-load vs compound).
  derived_from: Our_CS5

C050:
  type: claim
  confidence: 4.0
  statement: >
    Meeting memory (FP07) and email (FP09) have the strongest
    clinical evidence (Tier 1), no ADHD-specific tools identified
    in our research, an engagement model with no high
    vulnerabilities in our analysis (M2), and minimal user
    behaviour requirements (passive capture). If risk minimisation
    is a priority, this cluster appears favourable. The tradeoff
    is narrow applicability — only 2 of 13 problems are addressed.
  refs:
    depends_on: [C014, C015, C017, C018, C028]
  comments: >
    Affects product scope decisions and MVP definition.
  derived_from: Our_CS2

C051:
  type: claim
  confidence: 3.5
  statement: >
    Task initiation (FP01) scores highest on frequency (5/5) and
    is among the most-discussed problems in our sources. But the
    most compatible model (M1 Ambient Monitor) has high privacy
    requirements, significant build complexity, and an unresolved
    stuck-vs-thinking detection problem. High demand, high risk.
    The alternative path through M4 (Intelligent Reordering) is
    lower-risk but addresses initiation only partially.
  refs:
    depends_on: [C011, C012, C027]
  comments: >
    Affects product scope decisions and technical risk assessment.
  derived_from: Our_CS2

C052:
  type: claim
  confidence: 2.5
  statement: >
    ADHD is heterogeneous. Engagement patterns, problem severity,
    and intervention response vary by subtype (inattentive,
    hyperactive/impulsive, combined), comorbidity profile,
    medication status, and job type. The research does not
    differentiate by these factors. All claims in this system
    are averages across a heterogeneous population.
  refs:
    depends_on: [C033, C035]
  comments: >
    Affects target user definition, personalisation requirements,
    and confidence in universal claims.
  derived_from: Our_CS2

C053:
  type: claim
  confidence: 3.5
  statement: >
    Engagement model retention profiles are hypothesised from
    structural characteristics, not observed in longitudinal
    data. The only empirically supported retention finding in
    our reviewed literature is negative: Structured Check-In
    models are abandoned. Positive retention claims for other
    models (especially M2's strongest retention) are structural
    inferences that need testing.
  refs:
    depends_on: [C034]
  comments: >
    Affects confidence in retention claims, test design
    priorities, and what to validate first.
  derived_from: Our_CS2


C065:
  type: claim
  group: standard
  confidence: 3.5
  statement: >
    Triple Decay (MC1 + MC2 + MC5): Novelty fades, user stops
    initiating tool use, notifications try to re-engage, but
    notifications themselves have habituated — producing complete
    disengagement. This is the full "app graveyard" cascade.
  evidence_tier: 3
  derived_from: CS5
  refs:
    entities: [MC1, MC2, MC5]
    claims: [C034, C049]
  comments: >
    Compound effect — named interaction pattern from CS5 Section 4.
    Represents a causal cascade, not just co-occurrence. The
    amplifies refs on MC1/MC2/MC5 encode the pairwise links but
    do not name the three-way pattern.

C066:
  type: claim
  group: standard
  confidence: 3.5
  statement: >
    Lapse Trap (MC1 + MC3): Novelty fades, brief lapse occurs,
    visible failure accumulates, shame prevents return — producing
    permanent abandonment. This is why users "uninstall rather
    than confront 73 overdue tasks."
  evidence_tier: 3
  derived_from: CS5
  refs:
    entities: [MC1, MC3]
    claims: [C034]
  comments: >
    Compound effect — named interaction pattern from CS5 Section 4.
    The shame-avoidance loop (MC3) is triggered specifically by the
    visible evidence of lapse, which novelty collapse (MC1) creates.

C067:
  type: claim
  group: standard
  confidence: 3.5
  statement: >
    Stealth Requirement (MC2 + MC4): The tool must be always-on
    and proactively reaching the user (to overcome circular
    dependency) while also being invisible in the workplace (to
    avoid disclosure). These requirements are in tension —
    aggressive notifications are visible.
  evidence_tier: 3
  derived_from: CS5
  refs:
    entities: [MC2, MC4]
    claims: [C049]
  comments: >
    Compound effect — named interaction pattern from CS5 Section 4.
    Represents a structural tension between two meta-challenge
    mitigations, not just additive severity. Any design addressing
    MC2 (circular dependency) must also satisfy MC4 (disclosure
    barrier) constraints.


# ═══════════════════════════════════════════════════════════════
# PROBLEMS
# Observable workplace failures experienced by adults with ADHD.
# Scored on Frequency (Q1), ADHD Differentiation (Q2), and
# Connectedness (Q3).
# ═══════════════════════════════════════════════════════════════

FP03:
  type: problem
  name: Time Estimation and Time Blindness
  plain_language: >
    Cannot perceive how much time has passed or accurately
    estimate how long things will take. Loses hours without
    noticing. Plans that assume a working sense of time fail
    consistently.
  functional_definition: >
    Consistently misjudges how long tasks will take, leading to
    overcommitted schedules, missed deadlines, and unreliable
    time promises to colleagues and clients. Loses awareness of
    time passage during work.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Time estimation required whenever planning tasks, making
          commitments, or scheduling work — functionally daily for
          knowledge workers. Failure manifests daily as a background
          distortion affecting all planning. Users describe losing
          awareness of time passage "every day" during work. Not scored
          5 because the failure is a persistent distortion rather than
          discrete multiple-daily incidents.
        evidence: |
          27.8% report lateness problems often/very often [P1A, Tier 1].
          Daily time-awareness failures [P2A, Tier 3]. Practitioners
          identify it as most frequently reported workplace challenge
          [P2C, Tier 2].
        evidence_tier: "1"
      differentiation:
        score: 5
        assessment: |
          Neurologically distinct in ADHD — a fundamental difference in
          time perception, not merely poor planning. Neurotypical workers
          misjudge time occasionally; ADHD adults experience a persistent,
          qualitative inability to perceive time passage. Standard
          time-management advice ineffective because it assumes an internal
          time sense that doesn't exist. Tools designed for neurotypical
          estimation (calendars, to-do lists) fail because they assume
          existing time awareness.
        evidence: |
          Neurological basis documented [P2C, Tier 1-2]. Self-management
          to time identified as primary EF mediating deficit [P1C, Tier 1].
          Standard tools fail because they assume existing time awareness
          [P2B, Tier 3].
        evidence_tier: "1"
      connectedness:
        score: 5
        assessment: |
          Most connected problem in the set. Addressing would reduce:
          (1) FP04 Deadline misses — missed primarily from time estimation
          errors. (2) FP12 Chronic lateness — direct manifestation.
          (3) FP08 Long-term project neglect — delay discounting is a
          time-perception failure. (4) FP05 Prioritisation failure —
          inability to estimate duration prevents sequencing. (5) FP02
          Inconsistent focus — unnoticed time passage extends unproductive
          periods. P2C identifies time management as foundational with
          cascading effects across other work performance areas.
        evidence: |
          P2C cascading-effects model [Tier 2]. EF mediation analysis
          [P1C, Tier 1]. User narratives of chain reactions [P2A, Tier 3].
        evidence_tier: "1-2"
      total: 14
      evidence_tier_avg: 1.3
  refs:
    mechanisms: [MECH01]

    claims: [C008, C009, C010]
  derived_from: Our_S3

FP04:
  type: problem
  name: Deadline Misses
  plain_language: >
    Consistently fails to deliver work by agreed deadlines.
    Not from lack of effort but from misjudged time, focus
    lapses, and accumulated delays from upstream problems.
  functional_definition: >
    Submits work products after agreed deadlines. Requires
    deadline extensions or produces rushed, lower-quality output
    at the last minute. Creates downstream delays for dependent
    colleagues.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Most knowledge workers have multiple active deadlines, so the
          risk of deadline failure is daily. Actual miss rate is lower
          than daily, but daily experience of being behind schedule
          confirmed by WHO data (21.7 reduced-quantity days/year ≈ once
          per working week, with daily pressure on active deadlines).
        evidence: |
          21.7 days/year reduced work quantity [P1A, Tier 1]. #1
          termination reason [P2A, Tier 3]. Employer ratings show
          significant deadline impairment [P1A, Tier 1].
        evidence_tier: "1"
      differentiation:
        score: 3
        assessment: |
          Common general problem — many workers miss deadlines. ADHD
          version more frequent and severe (55% vs 11.7%) but observable
          failure looks similar. Differentiation lies in causes (time
          blindness, initiation failure, focus) not the failure itself.
          Standard deadline tools provide partial benefit — don't
          completely fail as they do for initiation or time estimation.
          Score 3: ADHD-specific aspects affect which solutions work,
          but the problem is partially addressable with general tools.
        evidence: |
          55% vs 11.7% prevalence gap [P1A, Tier 1]. Standard deadline
          tools provide partial benefit [P2B, Tier 3].
        evidence_tier: "1"
      connectedness:
        score: 3
        assessment: |
          Primarily a receiving problem — caused by FP01 (initiation),
          FP02 (focus), FP03 (time blindness), FP05 (prioritisation),
          FP08 (project neglect). Addressing deadline misses directly
          would not reduce upstream causes. Downstream consequence is
          poor evaluations/termination (excluded in S1). Score 3 rather
          than 2 because persistent deadline failures feed into the
          overwhelm-burnout cycle, worsening FP02 as stress accumulates.
        evidence: |
          P2C overwhelm-burnout cycle [Tier 2]. Primarily a receiving
          problem with limited causal broadcasting.
        evidence_tier: "1"
      total: 10
      evidence_tier_avg: 1.0
  refs:
    mechanisms: [MECH01, MECH05]
    claims: [C002, C003, C036]
  cluster_notes: >
    Convergence point receiving causal pressure from time blindness
    (CL_A — insufficient time allocated) and focus failure (CL_C —
    insufficient output produced).
  derived_from: Our_S3

FP12:
  type: problem
  name: Chronic Lateness
  plain_language: >
    Persistently late to work, meetings, and commitments
    despite consequences, warnings, and genuine effort. Driven
    by inability to perceive preparation time accurately.
  functional_definition: >
    Arrives late to work, meetings, appointments, and shift
    starts despite awareness of the problem and repeated
    consequences.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          For those affected, lateness is a daily risk — every scheduled
          commitment (work start, meetings, calls) presents opportunity.
          27.8% report as often/very often problem. Not scored 5 because
          not every scheduled event results in lateness; daily pattern
          but not multiple-times-per-day.
        evidence: |
          27.8% often/very often [P1A, Tier 1]. "Running behind" pattern
          [P1A, Tier 1]. Employer ratings confirm punctuality impairment
          [P1A, Tier 1].
        evidence_tier: "1"
      differentiation:
        score: 4
        assessment: |
          ADHD chronic lateness substantially different from occasional
          lateness. Persists despite awareness, consequences, repeated
          warnings, alarms, and genuine effort. Mechanism is time
          blindness — inability to perceive how much preparation time
          has elapsed. Standard advice ("leave earlier," "set alarms")
          provides partial benefit but doesn't address underlying
          time-perception deficit.
        evidence: |
          Persistence despite consequences [P1A, Tier 1]. Time blindness
          mechanism [P2C, Tier 2]. 27.8% vs 7.8% — 3.6x gap [P1A,
          Tier 1].
        evidence_tier: "1"
      connectedness:
        score: 2
        assessment: |
          Receiving problem caused by FP03 (time blindness). Solving
          lateness wouldn't reduce other problems. Consequences are
          interpersonal and reputational (FP14, FP15 — filtered in S2).
          Isolated downstream manifestation of time blindness.
        evidence: |
          Direct consequence of FP03 [analysis]. No upstream causal
          arrows to other functional problems.
        evidence_tier: "1"
      total: 10
      evidence_tier_avg: 1.0
  refs:
    mechanisms: [MECH01]

    claims: [C008]
  derived_from: Our_S3

FP01:
  type: problem
  name: Task Initiation Failure
  plain_language: >
    Knows exactly what to do but cannot start. An "invisible
    barrier" that effort alone cannot overcome. Qualitatively
    different from procrastination — not avoidance of unpleasant
    work, but a neurological gate that blocks action regardless
    of intent.
  functional_definition: >
    Fails to begin known-important work tasks despite
    understanding what needs to be done. Experiences extended
    delays between intending to start and actually starting,
    resulting in missed or compressed deadlines.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 5
        assessment: |
          Task initiation required every time a new task must be
          started — many times daily for knowledge workers. Users
          describe the "invisible barrier" as present every time
          switching to a new task, with multiple daily instances of
          paralysis. 40.7% report problems taking on new tasks
          often/very often.
        evidence: |
          #1 most-discussed problem in ADHD communities — extremely
          high frequency implied by volume [P2A, Tier 3]. 40.7%
          report problems often/very often [P1A, Tier 1]. Practitioners
          describe as "one of the most pervasive challenges" [P2C,
          Tier 2].
        evidence_tier: "1"
      differentiation:
        score: 5
        assessment: |
          Explicitly described as "fundamentally different from
          procrastination." The "invisible barrier" — knowing exactly
          what to do but physically unable to start — qualitatively
          distinct from neurotypical reluctance. ADHD involves a
          neurological gate that effort alone cannot open. Attributed
          to altered rewards-processing systems and weaker executive
          functions. Standard advice ("just start") fails because it
          assumes a functioning initiation system.
        evidence: |
          Qualitatively different from procrastination — "invisible
          barrier" [P2A, Tier 3]. Altered reward processing as
          mechanism [P2C, Tier 1-2]. Standard productivity advice
          fails [P2B, Tier 3].
        evidence_tier: "2"
      connectedness:
        score: 4
        assessment: |
          Drives: (1) FP04 Deadline misses — can't start = can't
          finish on time. (2) FP08 Long-term project neglect —
          initiation barrier higher for low-urgency tasks. (3) FP11
          Documentation paralysis — documentation particularly
          aversive to initiate. Does not directly cause FP03 (time
          blindness), FP12 (lateness), or FP06 (detail errors).
          Cluster centre for 3 problems, not a 5-problem hub.
        evidence: |
          User narratives link initiation to project neglect and
          documentation avoidance [P2A, Tier 3]. P2C identifies
          initiation as connected to multiple downstream failures
          [Tier 2].
        evidence_tier: "2"
      total: 14
      evidence_tier_avg: 1.7
  refs:
    mechanisms: [MECH02, MECH06]
    claims: [C011, C012]
  derived_from: Our_S3

FP11:
  type: problem
  name: Documentation and Administrative Paralysis
  plain_language: >
    Complete inability to start documentation tasks — timesheets,
    reports, meeting notes, evaluations. Low-stimulation plus
    high-effort creates the maximum initiation barrier. "Nothing
    makes it NOT paperwork."
  functional_definition: >
    Fails to complete required paperwork, reports, documentation,
    and administrative tasks. These tasks are chronically delayed
    or avoided despite understanding their importance.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          For roles with documentation requirements (most knowledge
          work), administrative tasks arise daily — timesheets, meeting
          notes, reports, records. ADHD users describe daily avoidance
          with backlogs accumulating.
        evidence: |
          "Paperwork is hell" — constant daily struggle [P2A, Tier 3].
          OT with ADHD describes ongoing paralysis completing
          evaluations [P2A, Tier 3].
        evidence_tier: "3"
      differentiation:
        score: 4
        assessment: |
          Documentation boring for everyone, but ADHD aversion
          substantially different. Users describe complete inability to
          start — beyond preference. "Nothing makes it NOT paperwork."
          Low-stimulation plus high-cognitive-load specifically triggers
          ADHD task-avoidance. Standard advice (batch, schedule,
          template) provides marginal benefit because the initiation
          barrier, not the process, is the problem. Combination of
          FP01 (initiation failure) and low-stimulation creates a
          uniquely severe barrier.
        evidence: |
          "Nothing makes it NOT paperwork" [P2A, Tier 3]. Task
          initiation barrier highest for low-stimulation tasks [P2C,
          Tier 2]. Standard advice limited benefit [P2A, Tier 3].
        evidence_tier: "3"
      connectedness:
        score: 2
        assessment: |
          Primarily a receiving problem — caused by FP01 (initiation
          failure applied to a specific domain). Solving documentation
          paralysis wouldn't reduce other problems. Specific
          manifestation of initiation failure in a particularly
          aversive context.
        evidence: |
          Downstream of FP01 [analysis]. No upstream effects on
          other problems.
        evidence_tier: "3"
      total: 10
      evidence_tier_avg: 3.0
  refs:
    mechanisms: [MECH02, MECH06]

    claims: [C011]
  derived_from: Our_S3

FP02:
  type: problem
  name: Inconsistent Focus
  plain_language: >
    Unpredictable oscillation between near-zero productivity
    and hyperfocus. Not uniformly poor attention — the
    variability itself is the problem. What works Monday may
    fail Tuesday. Standard focus tools assume a consistent
    baseline that does not exist.
  functional_definition: >
    Fails to maintain productive output for expected durations.
    Work that should take minutes extends to hours. Productive
    capacity varies dramatically day-to-day with no reliable
    pattern, resulting in unpredictable output.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 5
        assessment: |
          Focus failures occur throughout each working day. Users
          describe "literally getting almost no work done" with only
          "30 mins" of genuine focus. WHO: 21.7 days/year reduced
          quantity, 13.6 days reduced quality — on affected days,
          failure recurs repeatedly. 55% report "problems getting work
          done efficiently" often/very often — persistent daily
          experience, not occasional lapse.
        evidence: |
          55% often/very often (WFIRS) [P1A, Tier 1]. 21.7
          reduced-quantity days/year (WHO, n=7,075) [P1A, Tier 1].
          "Tasks that take others 5 min take me 30" [P2A, Tier 3].
          29.27% cite as #1 challenge (ADDitude, n≈1,000) [P2A,
          Tier 2].
        evidence_tier: "1"
      differentiation:
        score: 4
        assessment: |
          Everyone has focus lapses but ADHD version substantially more
          severe with qualitatively different patterns. Key
          differentiator is the variability — not uniformly poor focus
          but unpredictable oscillation between near-zero productivity
          and hyperfocus. "Different approaches seem to work on
          different days." Standard solutions (Pomodoro, focus apps)
          fail because they assume consistent baseline attention. Score
          4 not 5 because observable output failure (low productivity)
          looks similar in kind to neurotypical distraction, even
          though severity and variability substantially different.
        evidence: |
          Day-to-day variability as key differentiator [P2A, Tier 3].
          Standard tools fail due to variable response [P2B, Tier 3].
          55% vs 11.7% — 5x gap confirms substantial severity
          difference [P1A, Tier 1].
        evidence_tier: "1"
      connectedness:
        score: 4
        assessment: |
          Focus failure drives: (1) FP04 Deadline misses —
          low-productivity days accumulate into insufficient output.
          (2) FP06 Detail errors — attention lapses during execution
          produce errors. (3) FP08 Long-term project neglect —
          inability to sustain attention on unstimulating strategic
          work. Not scored 5 because focus failure is often downstream
          of FP03 (time blindness) and FP05 (prioritisation). Both
          causes and is caused by other problems, but causal influence
          outward affects 3 problems.
        evidence: |
          P1A multi-domain impairment — inattention central to most
          impairments [Tier 1]. P2C overwhelm-burnout cycle includes
          focus decline [Tier 2].
        evidence_tier: "1"
      total: 13
      evidence_tier_avg: 1.0
  refs:
    mechanisms: [MECH05, MECH02]

    claims: [C001, C002, C006, C007]
  derived_from: Our_S3

FP06:
  type: problem
  name: Attention-to-Detail Errors
  plain_language: >
    Persistent errors of oversight that survive repeated
    self-checking. Forgetting files, leaving debug code,
    sending incomplete work. The errors are identical to
    neurotypical mistakes but far more frequent and resistant
    to quality processes.
  functional_definition: >
    Produces work containing errors of oversight — typos,
    incorrect figures, missed steps, incomplete submissions —
    despite checking. Requires excessive QA from self or others
    before work meets quality standards.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Detail errors occur regularly throughout work. Users describe
          errors persisting "even after checking 2 or 3x." Programmers
          report daily issues — forgetting files, leaving debug code,
          minor coding errors. DSM-5 uses "often" frequency. 22.5%
          report poor evaluations driven by error patterns. 55%
          reporting inefficient work includes error-driven rework.
        evidence: |
          DSM-5 "often" criterion [Tier 1]. 22.5% poor evaluations
          [P1A, Tier 1]. Daily occurrence in user reports [P2A,
          Tier 3].
        evidence_tier: "1"
      differentiation:
        score: 3
        assessment: |
          Everyone makes mistakes. ADHD version more frequent and
          resistant to self-checking, but errors themselves look
          identical. Differentiation is in severity (persisting after
          multiple checks) and inability of standard QA to compensate.
          However, automated checking tools (spell-check, linters,
          validators) work equally well for both populations. Score 3:
          ADHD users need more aggressive automated checking, but tools
          don't need fundamentally different design.
        evidence: |
          DSM criterion confirms higher prevalence [Tier 1]. Errors
          persist after checking — more severe [P2A, Tier 3]. Standard
          error-detection tools work for both populations.
        evidence_tier: "1"
      connectedness:
        score: 3
        assessment: |
          Primarily connects to FP04 (deadline misses) — rework from
          errors extends task duration. Downstream of FP02 (focus
          failure) — attention lapses cause the errors. Terminal
          failure mode (error → rework or consequences) rather than
          a hub that cascades.
        evidence: |
          P2A multiple terminations linked to detail errors [Tier 3].
          Primarily a receiving problem from FP02.
        evidence_tier: "2"
      total: 10
      evidence_tier_avg: 1.0
  refs:
    mechanisms: [MECH05, MECH04]

    claims: [C006]
  derived_from: Our_S3

FP05:
  type: problem
  name: Prioritisation Failure
  plain_language: >
    Cannot use importance as a prioritisation criterion.
    Responds to interest, novelty, and urgency instead.
    "Procrastivity" — doing interesting low-priority tasks
    while important tasks stagnate.
  functional_definition: >
    Spends time on low-value activities while high-priority
    tasks are neglected. Cannot effectively sequence multiple
    competing demands. When faced with several tasks of similar
    urgency, either freezes or switches rapidly without
    completing any.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 5
        assessment: |
          Prioritisation decisions throughout each day — which email
          first, which task next, whether to respond to interruption.
          ADHD adults face these more frequently because priorities
          lost after each interruption. ADDitude poll: 21.86% of ~1,000
          cite as #1 challenge. Combined with 55% reporting inefficient
          work and daily paralysis from competing demands.
        evidence: |
          21.86% of ~1,000 cite as top challenge [P2A, Tier 2].
          Included in 55% reporting inefficient work [P1A, Tier 1].
          Daily paralysis from competing demands [P2A, Tier 3].
        evidence_tier: "1-2"
      differentiation:
        score: 4
        assessment: |
          Common general problem but ADHD creates substantially more
          severe version. Key differentiator: ADHD brains cannot
          reliably use importance/urgency — respond to interest,
          novelty, immediate consequences instead. Tools offering "more
          options" make problem worse for ADHD users while helping NT
          users. Standard prioritisation frameworks (Eisenhower etc.)
          assume ability to override preference with importance that
          ADHD fundamentally impairs. Score 4 not 5 because observable
          failure (doing wrong task) looks similar even if mechanism
          differs.
        evidence: |
          Interest-based not importance-based activation [P2C, Tier 2].
          Standard frameworks fail [P2B, Tier 3]. Same problem but
          significantly more severe — fits score 4 definition.
        evidence_tier: "2"
      connectedness:
        score: 4
        assessment: |
          Drives: (1) FP08 Long-term project neglect — strategic work
          deprioritised for urgent daily tasks (procrastivity). (2) FP04
          Deadline misses — working on wrong tasks means right tasks
          don't get done. (3) FP02 Inconsistent focus — time on
          low-value activities is a form of focus misdirection. Not a
          hub — doesn't directly cause FP03, FP12, or FP06.
        evidence: |
          P2C "procrastivity" — tackling easier tasks while avoiding
          priorities [Tier 2]. P2A paralysis from competing demands
          leading to "nothing gets done" [Tier 3].
        evidence_tier: "2"
      total: 13
      evidence_tier_avg: 1.7
  refs:
    mechanisms: [MECH02, MECH05]
    amplifies_clusters: [CL_A, CL_B, CL_C]
    claims: [C012, C013]
  amplification_mechanism: >
    FP05 worsens all clusters: can't prioritise which deadlines
    matter (A), prioritises easy over strategic work — procrastivity
    (B), focuses on wrong tasks amplifying limited focus capacity (C).
  derived_from: Our_S3

FP08:
  type: problem
  name: Long-Term Project Neglect
  plain_language: >
    Strategic projects are abandoned or starved while daily
    operational work gets done. Driven by delay discounting
    (distant deadlines create zero urgency) and initiation
    failure (low-stimulation strategic work is hardest to
    start).
  functional_definition: >
    Completes daily operational tasks but fails to make progress
    on strategic, multi-week or multi-month projects. Distant
    deadlines do not generate sufficient motivation to act until
    crisis point.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Avoidance of long-term projects is a daily pattern — each day
          the worker chooses immediate tasks over strategic work. Not a
          single event but daily accumulation of avoidance. Users
          describe completing daily operational work while strategic
          projects remain untouched for weeks or months.
        evidence: |
          Daily pattern of doing immediate tasks while avoiding
          long-term work [P2A, Tier 3]. 69.2% report "working below
          potential" (WFIRS) — many instances likely reflect this
          pattern [P1A, Tier 1].
        evidence_tier: "2"
      differentiation:
        score: 5
        assessment: |
          Driven by delay discounting — neurological bias drastically
          undervaluing distant rewards relative to immediate ones.
          Well-documented, neurologically-grounded ADHD phenomenon
          qualitatively different from general procrastination.
          Neurotypical workers can motivate toward distant goals using
          importance; ADHD brains literally discount distant outcomes
          more steeply. Standard project management tools (Gantt
          charts, milestone trackers) ineffective because they assume
          future milestones create present motivation.
        evidence: |
          Delay discounting as ADHD-specific mechanism [P2A, Tier 1 —
          Barkley]. "Inherently unable to anticipate and plan for the
          future" with a "very short time horizon" [P2A, Tier 2]. User
          terminated specifically for this pattern [P2A, Tier 3].
        evidence_tier: "1-2"
      connectedness:
        score: 3
        assessment: |
          Primarily connects to FP04 (deadline misses) — neglected
          projects eventually hit deadlines, creating crisis. More a
          consequence of FP03, FP01, and FP05 than a cause of other
          problems. Solving project neglect wouldn't reduce focus, time
          blindness, or detail errors. Connects strongly to one
          downstream outcome but is otherwise a receiving problem.
        evidence: |
          P2C overwhelm cycle — project neglect leads to deadline
          crises [Tier 2]. Causal arrows primarily point toward this
          problem from FP01, FP03, FP05 [Tier 2].
        evidence_tier: "2"
      total: 12
      evidence_tier_avg: 1.7
  refs:
    mechanisms: [MECH02, MECH01, MECH03]
    claims: [C013, C037]
  cluster_notes: >
    Convergence point receiving causal pressure from time blindness
    (CL_A — delay discounting compresses time horizon) and initiation
    failure (CL_B — activation energy highest for low-urgency work).
  derived_from: Our_S3

FP07:
  type: problem
  name: Meeting and Instruction Memory Failure
  plain_language: >
    Understands everything during a meeting but cannot recall
    it afterward. Not an attention problem — an encoding problem.
    Information is processed in real time but never reaches
    long-term storage. Standard note-taking creates a dual-task
    problem that worsens it.
  functional_definition: >
    Processes and understands information during meetings and
    conversations but cannot recall content shortly afterward.
    Fails to remember action items, instructions, or commitments
    made in verbal interactions.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Knowledge workers attend meetings and receive verbal
          instructions daily. For those affected, memory failure at
          virtually every meeting. "Understanding everything being
          said — walking out and not remembering anything." 75-81% of
          ADHD individuals show measurable working memory impairment.
        evidence: |
          Daily occurrence [P2A, Tier 3]. Forgetting instructions as
          common presenting problem [P2C, Tier 2]. DSM-5: "often does
          not seem to listen when spoken to directly" [Tier 1].
          Bifactor modelling: 75-81% impairment prevalence [P3B,
          Tier 1].
        evidence_tier: "1-2"
      differentiation:
        score: 5
        assessment: |
          Supplementary research established ADHD meeting-memory failure driven by
          encoding deficit, not retrieval failure. P3 amplitude
          reduction during encoding shows the ADHD brain fails to
          encode information into memory even while processing in
          real-time. Neurologically distinct from neurotypical forgetting
          (which is retrieval failure). Methylphenidate does not
          normalise — treated adults still show large impairments.
          Standard note-taking creates dual-task problem (listen +
          decide importance + write). Raised from 4 to 5: qualitatively
          different neurological process requiring fundamentally
          different design.
        evidence: |
          P3 encoding signal measurably lower [Missonnier et al. 2013,
          Tier 1]. Encoding vs retrieval confirmed [Bonilla et al.
          2020, Tier 1]. Medication reduces but doesn't eliminate
          deficit [Fuermaier et al. 2016, Tier 1]. Note-taking creates
          dual-task problem [P3B, Tier 2-3].
        evidence_tier: "1"
      connectedness:
        score: 2
        assessment: |
          Relatively isolated. Can lead to missed action items
          (connecting to FP04 deadline misses) but causal chain is
          indirect. Shares working memory root cause with FP09 but
          solving one wouldn't solve the other — contexts and failure
          modes differ. Specific, contained failure domain.
        evidence: |
          Primarily isolated to verbal information retention.
          Prospective memory impairment affects action items [P3B,
          Tier 1] but broadcasting effect is limited.
        evidence_tier: "2-3"
      total: 11
      evidence_tier_avg: 1.7
  refs:
    mechanisms: [MECH04, MECH03]

    claims: [C014, C015, C016]
  cluster_notes: >
    Standalone. Encoding deficit operates independently of time
    perception, initiation, and focus. Occurs even when user is
    fully engaged. Shares working memory root with FP09 but solving
    one wouldn't solve the other — contexts and failure modes differ.
  derived_from: Our_S3

FP09:
  type: problem
  name: Email and Communication Management Failure
  plain_language: >
    Reads emails, forms intention to reply, then the intention
    vanishes. Not inbox overwhelm — prospective memory failure.
    The "read and forgot" pattern. Standard email tools address
    volume and speed; none address forgotten reply intentions.
  functional_definition: >
    Fails to respond to emails and messages within expected
    timeframes. Reads communications but forgets to reply.
    Inboxes accumulate to the point of avoidance.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Email and messaging are daily activities. ADHD users describe
          daily failures — forgetting to reply, inbox accumulation,
          avoidance. Prospective memory impairment (d=1.60)
          applied to volume of daily email strongly supports multiple
          daily failures. Case could be made for 5 but relies on
          inference not direct measurement. Score 4 is the
          evidence-conservative choice. Evidence tier improved from
          Tier 3 to Tier 1-2.
        evidence: |
          Prospective memory impairment d=1.60 for task planning
          [Altgassen et al. 2014/2019, Tier 1]. Daily avoidance and
          forgetting to reply [P2A, Tier 3]. Practitioners: email
          overwhelm as daily experience [Tier 2].
        evidence_tier: "1-2"
      differentiation:
        score: 4
        assessment: |
          Supplementary research confirmed substantial differentiation: (1) prospective
          memory failure as qualitatively different mechanism — "read it,
          intended to reply, forgot" is neurological not procrastination
          [Tier 1]; (2) avoidance-shame spiral driven by RSD amplifies
          delay [Tier 2]; (3) standard email strategies (batch, folders,
          inbox zero) fail for ADHD-specific reasons — assume prospective
          memory and return-to-check behaviours that ADHD impairs
          [Tier 2-3]. Score 4 not 5 because observable failure
          (late/missing replies) exists on continuum with neurotypical
          email overwhelm — mechanism different but outcome not.
        evidence: |
          Prospective memory as distinct mechanism [Tier 1]. Four-layer
          convergence: prospective memory + task initiation + decision
          fatigue + emotional avoidance [P3A, Tier 1-2]. "Out of sight,
          out of mind" [P2B, Tier 3].
        evidence_tier: "1-2"
      connectedness:
        score: 3
        assessment: |
          Supplementary research identified direct causal link to FP04 via missed
          action items in email. Termination case for failed calendar
          invite demonstrates chain. Email failure feeds
          overwhelm-burnout cycle — accumulated unanswered emails
          create stress worsening FP02 (focus) and FP01 (initiation)
          through shame-driven paralysis. Still modest — primarily a
          receiving problem — but direct FP04 link warrants 3 over 2.
          Raised from 2 to 3 after supplementary research.
        evidence: |
          Email → missed action items → deadline failure [P3A, Tier 2].
          Termination for missed calendar invite [P2A, Tier 3]. Email
          backlog feeds overwhelm-burnout cycle [P2C, Tier 2].
        evidence_tier: "2"
      total: 11
      evidence_tier_avg: 1.7
  refs:
    mechanisms: [MECH03, MECH06]

    claims: [C017, C018, C019]
  cluster_notes: >
    Standalone. Involves a specific combination of initiation,
    prospective memory, and avoidance in a contained domain.
    Connects loosely to FP01 (initiation) and FP07 (memory) but
    neither fully explains the email-specific avoidance cycle.
  derived_from: Our_S3

FP10:
  type: problem
  name: Context Switching Cost
  plain_language: >
    Recovery from interruptions takes 30+ minutes. Not just
    losing focus — losing the entire mental context that was
    built up during focused work. An environmental/workload
    interaction more than a core EF failure.
  functional_definition: >
    Loses significant productive time when transitioning between
    tasks or recovering from interruptions. After being pulled
    away from work, requires extended reorientation time before
    regaining productive focus.
  status: active
  evaluations:
    scoring:
      frequency:
        score: 4
        assessment: |
          Context switches occur multiple times daily — meetings
          interrupt focused work, colleagues ask questions,
          notifications arrive. Recovery from switches is the primary
          problem, with reorientation taking 30+ minutes per switch.
          One user estimates 2-3 hours/day lost to reorientation.
        evidence: |
          "2-3 hours of my day is spent just staring at something"
          [P2A, Tier 4 — single user]. 30-minute recovery after
          meetings [P2A, Tier 3 — programmer reports]. Daily
          occurrence certain; severity data limited.
        evidence_tier: "3-4"
      differentiation:
        score: 3
        assessment: |
          Context switching cost well-documented general problem (23
          minutes average recovery for all workers). ADHD version
          appears more severe (30+ min, emotional distress) but
          mechanism is similar — rebuilding mental context.
          Differentiation is in severity not kind. Standard solutions
          (time-blocking, notification management, DND) work for ADHD
          users but need more aggressive application. Score 3 not 4
          because problem isn't qualitatively different.
        evidence: |
          General population context-switching research shows similar
          but less severe patterns [Tier 1]. ADHD-specific data
          limited to user reports [P2A, Tier 3-4]. Standard solutions
          partially work [P2B, Tier 3].
        evidence_tier: "3"
      connectedness:
        score: 2
        assessment: |
          Relatively isolated. Contributes to FP02 (inconsistent
          focus) but not the primary cause. Doesn't cause time
          blindness, initiation failure, or prioritisation problems.
          Specific workload-environment interaction rather than core
          EF failure.
        evidence: |
          Shares context with focus problems but solving it wouldn't
          address underlying attention deficit.
        evidence_tier: "3"
      total: 9
      evidence_tier_avg: 3.3
  refs:
    mechanisms: [MECH05]

    claims: [C021]
  cluster_notes: >
    Standalone. Environmental/workload interaction more than core
    EF failure. Influenced by meeting culture and notification
    environment (partially outside individual control). Shares
    context with FP02 (focus) but mechanistically different.
  derived_from: Our_S3

# FP13 (Waiting Mode) DEMOTED — see CT_006.
