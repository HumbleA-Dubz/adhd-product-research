# ═══════════════════════════════════════════════════════════════
# MECHANISMS
# Cross-cutting cognitive/neurological processes that explain
# WHY functional problems co-occur.
# ═══════════════════════════════════════════════════════════════

MECH01:
  type: mechanism
  name: Time Perception Distortion
  plain_language: >
    The inability to sense how much time has passed or how much
    time something will take. Not poor planning — the internal
    clock runs differently. An hour can feel like ten minutes.
    A deadline three days away feels as distant as one three
    months away.
  variability: >
    Moderate. Some individuals experience more stable time
    distortion; others see meaningful variation by day or context.
  does_not_explain: >
    Task initiation failure — a person can be aware that time
    is passing and still not start. Initiation is primarily a
    reward/activation problem, not a time-perception problem.
  refs:

    underlies_challenges: [MC5]
    evidence: [C008, C009, C010]

MECH02:
  type: mechanism
  name: Reward and Activation Processing
  plain_language: >
    The brain's activation system runs on interest, novelty,
    urgency, and challenge — not importance. Tasks that lack
    these qualities cannot generate the activation energy
    needed to start or sustain work. Distant deadlines create
    near-zero urgency. Familiar tasks create near-zero novelty.
    The result: the important-but-boring thing never gets done.
  variability: >
    Highly variable. Medication, sleep, novelty of current
    context, and mood all modulate activation thresholds.
    What a person can start on Monday may be impossible on
    Tuesday.
  does_not_explain: >
    Meeting memory failure — a person can be fully activated
    and engaged in a meeting but still fail to encode or
    remember commitments. Encoding is a separate mechanism.
  refs:

    underlies_challenges: [MC1, MC5]
    evidence: [C011, C012, C013]

MECH03:
  type: mechanism
  name: Prospective Memory and Retrieval-Visibility Failure
  plain_language: >
    Two related failures unified by the same principle: out of
    sight, out of mind.
    (1) Intention loss: Forgetting to do things you intended to
    do. You read the email, decided to reply after lunch. After
    lunch, the intention is gone. You left the meeting knowing
    you committed to send a document. By the time you reach your
    desk, the commitment has vanished.
    (2) Information retrieval loss: Stored information becomes
    inaccessible once it leaves the visual field. Notes are
    saved, emails are filed, tabs are bookmarked — but without
    a visible cue, the information effectively ceases to exist.
    The person may know they stored it but cannot find or
    reconnect with it. Digital systems become graveyards of
    unretrievable content.
    Both facets share the same underlying deficit: cue-dependent
    memory access. Without an external prompt, neither intentions
    nor stored information can be retrieved.
  variability: >
    Relatively stable. Prospective memory failure is one of
    the more consistent ADHD deficits — less variable across
    days and contexts than activation or attention. Retrieval-
    visibility failure is similarly stable: it worsens with
    information volume but the underlying deficit is constant.
  does_not_explain: >
    Why users cannot start tasks they are looking directly at.
    This mechanism is about absent cues — the intention or
    information is not in front of you. When the task IS in
    front of you and you still can't start, that is activation,
    not memory.

  refs:

    underlies_challenges: [MC2]
    evidence: [C016, C017, C019]

MECH04:
  type: mechanism
  name: Encoding Deficit
  plain_language: >
    Information does not get stored during real-time processing,
    even when the person is engaged and comprehending. You
    understood everything in the meeting. You were paying
    attention. But the information never made it into memory.
    This is not a retrieval problem — the information was never
    encoded in the first place.
  variability: >
    Relatively stable. Encoding deficit is a consistent
    impairment, less affected by day-to-day variation than
    attention or activation.
  does_not_explain: >
    Task initiation or prioritisation. Encoding deficit affects
    information retention, not decision-making or activation.
    A person can have perfect encoding and still not start work.
  refs:

    underlies_challenges: []
    evidence: [C014, C015, C016]

MECH05:
  type: mechanism
  name: Attention Allocation Dysfunction
  plain_language: >
    The inability to voluntarily direct and sustain focus where
    you choose. This produces BOTH hypofocus (attention drifts
    without awareness) AND hyperfocus (attention locks onto
    something stimulating and cannot be redirected). The same
    mechanism — dysregulated allocation — creates opposite
    presentations depending on the stimulus.
  variability: >
    Highly variable. Medication, environment, interest level,
    and fatigue all substantially modulate attention allocation.
  does_not_explain: >
    Email or meeting memory failure. A person can be fully
    focused during a meeting (attention allocated correctly)
    and still fail to encode or remember commitments. Attention
    and encoding are separable deficits.

  refs:

    underlies_challenges: [MC1, MC5]
    evidence: [C006, C007]

MECH06:
  type: mechanism
  name: Emotional Dysregulation
  plain_language: >
    Heightened sensitivity to criticism, rejection, failure,
    and frustration. Shame responses that are faster and more
    intense than neurotypical. Fear of doing something wrong
    can prevent starting. Missing a day creates a shame spiral
    that prevents returning. Negative feedback hits harder and
    lasts longer.
  variability: >
    Highly variable. Stress, sleep deprivation, social context,
    and recent experiences of rejection or criticism all
    substantially modulate emotional reactivity.
  does_not_explain: >
    Time perception or encoding. Emotional dysregulation
    amplifies the consequences of other deficits (missing a
    deadline feels catastrophic, which drives avoidance) but
    does not cause the underlying time or memory impairment.

  refs:

    underlies_challenges: [MC3, MC4]
    evidence: [C020, C021]


# ═══════════════════════════════════════════════════════════════
# CLUSTERS
# Observed co-occurrence groupings of functional problems.
# Clusters describe WHAT goes together; mechanisms describe WHY.
# ═══════════════════════════════════════════════════════════════

CL_A:
  type: cluster
  name: "Cluster A — Time-Perception Cascade"
  causal_direction: >
    Single hub radiating outward. FP03 causes FP04, FP12,
    and partially FP08. No bidirectional causation within
    the cluster.
  refs:
    hub: FP03
    members: [FP03, FP04, FP12, FP08]
    primary_mechanism: MECH01
    claims: [C008, C009, C010]
  derived_from: Our_S4

CL_B:
  type: cluster
  name: "Cluster B — Initiation-Execution Bottleneck"
  causal_direction: >
    Single hub radiating outward. FP01 causes FP08 and FP11
    through the same mechanism (activation energy exceeds
    capacity) applied to task types with decreasing stimulation.
  refs:
    hub: FP01
    members: [FP01, FP08, FP11]
    primary_mechanism: MECH02
    claims: [C011, C012]
  derived_from: Our_S4

CL_C:
  type: cluster
  name: "Cluster C — Attention-Quality Chain"
  causal_direction: >
    Single hub radiating outward. FP02 causes FP06 directly
    and FP04 through accumulated productivity loss. FP04 is
    a convergence point receiving from both Cluster A and C.
  refs:
    hub: FP02
    members: [FP02, FP06, FP04]
    primary_mechanism: MECH05
    claims: [C001, C002, C006]
  derived_from: Our_S4


# ═══════════════════════════════════════════════════════════════
# META-CHALLENGES
# Cross-cutting structural constraints that apply to ANY ADHD
# workplace product regardless of problem cluster, engagement
# model, or implementation.
# ═══════════════════════════════════════════════════════════════

MC1:
  type: meta_challenge
  name: Novelty Decay and Intervention Habituation
  plain_language: >
    ADHD brains habituate to interventions as novelty fades.
    The tool that works brilliantly in week one may be invisible
    by week four — not because it stopped being useful, but
    because the brain stopped registering it as stimulating.
    This is neurological, not a UX failure.
  severity: Critical
  severity_rationale: >
    Medication — the gold-standard intervention — has 56% adherence
    and 50-70% first-year discontinuation. Digital interventions
    perform worse (77% non-completion). If the strongest intervention
    cannot maintain engagement, any digital tool faces this at scale.
  severity_evidence: [C024, C025, C022]
  evidence_tier: Tier 1-2
  key_evidence: >
    Medication adherence averages 56% (n=4,011); 50-70%
    discontinue within 1 year (n=1.2M); 77% do not complete
    self-guided digital interventions; app graveyard is
    universal across all tool categories.
  refs:
    clusters_affected: [CL_A, CL_B, CL_C]
    claims: [C022, C024, C025]
    amplifies: [MC2, MC3, MC5]

  derived_from: Our_Meta_Challenges

MC2:
  type: meta_challenge
  name: Circular Dependency
  plain_language: >
    Every ADHD tool requires the user to engage with it using
    the very cognitive functions the tool compensates for.
    You need to remember to use the tool that helps you
    remember. You need to initiate use of the tool that helps
    you initiate. This is structural and irreducible — it can
    only be asymptotically reduced.
  severity: Critical
  severity_rationale: >
    Prospective memory failure (52% vs 21% controls) means
    forgetting to use the tool is the neurological default, not
    a design failure. SMS reminders habituated after one module,
    confirming external prompts also decay.
  severity_evidence: [C019, C025]
  evidence_tier: Tier 1-2
  key_evidence: >
    Prospective memory: 52% of ADHD participants forgot a
    naturalistic task vs 21% controls. Task initiation: 40.7%
    report problems often/very often. SMS reminders increased
    login at module 2 only — the reminder itself habituates.
    "Those apps will NEVER WORK because you have to remember
    to look at them, which you won't."
  refs:
    clusters_affected: [CL_A, CL_B, CL_C]
    claims: [C019, C025]
    amplifies: [MC3]

  derived_from: Our_Meta_Challenges

MC3:
  type: meta_challenge
  name: Shame-Avoidance Spiral
  plain_language: >
    When the user falls behind, the tool generates visible
    evidence of failure — overdue counts, broken streaks,
    unprocessed queues. This triggers shame that makes
    re-engagement less likely, not more. The tool designed
    to help becomes a source of pain. Distinct from novelty
    decay: this operates even when the user wants to return.
  severity: High
  severity_rationale: >
    Visible failure accumulation (overdue counts, broken streaks)
    triggers avoidance in a population with heightened rejection
    sensitivity. Non-adapted CBT worsened self-esteem, confirming
    the mechanism operates clinically.
  severity_evidence: [C020, C021, C022]
  evidence_tier: Tier 2-3
  key_evidence: >
    "73 overdue tasks glaring at me — I'd rather uninstall
    the app than confront the reality." Pre-formatted planners
    create shame from blank pages. Non-adapted CBT worsened
    self-esteem, increased sense of failure. Users who praised
    sustained tools (plain notebooks, Amazing Marvin) cited
    "no judgment for missed days."
  refs:
    clusters_affected: [CL_A, CL_B, CL_C]
    claims: [C020, C021, C022]
    amplifies: []

  derived_from: Our_Meta_Challenges

MC4:
  type: meta_challenge
  name: Disclosure and Workplace Visibility Constraint
  plain_language: >
    Using an ADHD-specific tool in a workplace creates
    disclosure risk — an "ADHD Planner" visible during
    screen-share, a bot with a neurodivergent brand. Many
    ADHD adults have not disclosed at work and fear
    discrimination. The tool must serve ADHD-specific needs
    while being invisible or neutral in workplace contexts.
  severity: High
  severity_rationale: >
    Workplace disclosure risk is a constraint independent of
    tool effectiveness. Commercially validated by the general-
    branding pattern (Motion, Sunsama, Granola succeed partly
    by avoiding neurodivergent signalling).
  severity_evidence: [C026]
  evidence_tier: Tier 2-3
  key_evidence: >
    Practitioners report consistent disclosure dilemma across
    clients: fear of discrimination, uncertainty, managers
    who don't know how to respond. Most successful ADHD-
    adjacent tools (Motion, Sunsama, Reclaim) brand as
    general productivity. Granola's bot-free approach is
    commercially validated partly by removing the social signal.
  refs:
    clusters_affected: [CL_A, CL_B, CL_C]
    claims: [C026]
    amplifies: [MC3]

  derived_from: Our_Meta_Challenges

MC5:
  type: meta_challenge
  name: Notification Desensitisation
  plain_language: >
    ADHD brains desensitise to repeated notifications faster
    than neurotypical brains. Alarms, push notifications, and
    email reminders lose effectiveness within weeks as the
    brain filters them as non-novel. Even a perfectly designed
    intervention fails if the notification that delivers it
    is no longer perceived.
  severity: Moderate-High
  severity_rationale: >
    SMS reminder habituation after a single module demonstrates
    rapid notification decay specific to ADHD. Every notification-
    dependent delivery mechanism faces this constraint.
  severity_evidence: [C022, C021]
  evidence_tier: Tier 2-3
  key_evidence: >
    SMS reminders for ADHD interventions increased login at
    module 2 only — no effect on remaining modules. Pomodoro
    failure is the canonical example. "I soon become
    desensitised to them and stop paying attention." Alarm
    fatigue documented across every time-management tool
    category.
  refs:
    clusters_affected: [CL_A, CL_B]
    claims: [C022, C021]
    amplifies: [MC2]

  derived_from: Our_Meta_Challenges

MC6:
  type: meta_challenge
  name: System-Building as Substitute
  severity_rationale: >
    System-building provides novelty and dopamine that actual work
    cannot, creating a self-reinforcing loop. Documented across
    every major productivity platform (Notion, Obsidian, ClickUp,
    OmniFocus, Trello, Asana, bullet journals).
  severity_evidence: [C025]
  plain_language: >
    The act of configuring, customising, and building
    productivity systems becomes the work itself, substituting
    for the actual tasks the system was meant to support. The
    system-building provides novelty and interest (satisfying
    MECH02) while feeling productive, so the brain prefers it
    to the real work. Distinct from Circular Dependency (MC2):
    MC2 is the capacity paradox (need EF to use EF tool). MC6
    is the motivation hijack (building the system delivers
    the dopamine that actual work should). Distinct from
    Novelty Decay (MC1): MC1 is about losing interest over
    time. MC6 is about the initial engagement phase being
    misdirected into meta-work.
  severity: High
  evidence_tier: Tier 3
  key_evidence: >
    P2B Core Pattern #1 "The Setup Hyperfocus Trap": users
    spend more time tweaking templates than working. Notion:
    "I've spent way more time playing with Notion than actually
    being productive." Obsidian: "Do I use Obsidian retooling
    and nitpicking as a form of task avoidance? Yes." ClickUp:
    "distraction, procrastination, and what I call productivity
    theater." OmniFocus: "I ended up spending more time managing
    the tasks than doing them." P2B Core Pattern #5: "The tool
    itself turns into another task I need to oversee." Documented
    across Notion, Obsidian, ClickUp, Trello, OmniFocus, Asana,
    and bullet journals.
  refs:
    clusters_affected: [CL_B, CL_C]
    claims: [C025]
    amplifies: [MC1, MC3]

  derived_from: Morning_Extraction_Feb25


# ═══════════════════════════════════════════════════════════════
# CROSS-CUTTING CONCERNS
# Population-level observations that modify or contextualise
# the problem landscape but are not targetable problems.
# ═══════════════════════════════════════════════════════════════

CC01:
  type: cross_cutting_concern
  name: Neurodiversity Spectrum Variance
  plain_language: >
    ADHD is not one thing. Co-occurring conditions (autism,
    dyslexia, dyscalculia, anxiety) change the functional profile
    substantially. What works for ADHD-only may fail for
    ADHD+autism. Any tool must accommodate a wide range of
    profiles rather than targeting a single archetype.
  refs:
    claims: [C033, C038]
  implications:
    - No single intervention profile will fit the population
    - Personalisation is a structural requirement, not a feature
    - Testing with one ADHD subtype does not validate for others
  derived_from: Our_KG

CC02:
  type: cross_cutting_concern
  name: Multi-Domain Co-Occurrence
  plain_language: >
    ADHD functional problems do not confine themselves to work.
    The same mechanisms that cause task initiation failure at work
    cause it at home. Users do not separate "work ADHD" from
    "life ADHD". Any work-focused tool exists in a person's whole
    life context.
  refs:
    claims: [C001, C039]
  implications:
    - Work-only framing may miss relevant context
    - Tools scoped purely to work may feel artificial to users
    - Cross-domain data could improve prediction and support
  derived_from: Our_KG

CC03:
  type: cross_cutting_concern
  name: Missing Wish-List
  plain_language: >
    Users can articulate pain in vivid detail but struggle to
    describe what a solution would look like. They know what hurts
    but cannot envision what would help. Standard "what would you
    want?" research questions yield either blank stares or requests
    that restate the problem.
  refs:
    claims: [C040]
  implications:
    - Feature discovery cannot rely on direct user specification
    - Behavioural observation outweighs stated preference
    - Value must be inferred from what users DO, not what they SAY
  derived_from: Our_KG

CC04:
  type: cross_cutting_concern
  name: Medication Persistence Gap
  plain_language: >
    Medication helps but does not resolve functional workplace
    problems. Users on medication still experience the full range
    of functional failures, albeit sometimes at reduced intensity.
    Medication is not an alternative to structural support.
  refs:
    claims: [C041]
  implications:
    - Tools cannot assume medication solves the problem
    - The target population includes medicated individuals
    - Complementary structural support has value even for
      medicated users
  derived_from: Our_KG


# ═══════════════════════════════════════════════════════════════
# ENGAGEMENT MODELS
# Structurally distinct ways a product could engage ADHD users.
# Describes the relationship between user and product: when
# interaction occurs, who initiates, what effort the user
# expends, and what the product does without user input.
# ═══════════════════════════════════════════════════════════════

M1:
  type: engagement_model
  name: Ambient Monitor and Intervene
  plain_language: >
    The product watches your work in the background. When it
    detects you're stuck — stalling, switching tabs, overrunning
    time — it intervenes. You don't ask for help; it notices
    and acts. Intervention is graded: lightest touch first,
    escalating only if the problem persists.
  dimensions:
    initiation: Strongly product-initiated
    effort: Near-zero
    timing: During problem
    continuity: Embedded (desktop agent or browser extension)
  retention_risk: >
    Does not depend on habit formation. Risk is nudge fatigue —
    if interventions become ignorable, the tool degrades into
    another notification to dismiss.
  habit_burden: Minimal
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Moderate
        rationale: Interventions may habituate
      MC2:
        level: Low
        rationale: Always-on, no initiation needed
      MC3:
        level: Low
        rationale: No visible failure accumulation
      MC4:
        level: Moderate
        rationale: Desktop agent visible in taskbar
      MC5:
        level: High
        rationale: Depends on notifications landing
  refs:
    primary_problems: [FP01]
    secondary_problems: [FP02, FP03]
    claims: [C011, C027]
  derived_from: Our_L2

M2:
  type: engagement_model
  name: Passive Capture and Structured Delivery
  plain_language: >
    The product automatically captures information from your
    meetings, emails, and chats — information you'd otherwise
    forget. You change nothing about how you work. It processes
    what it captures and delivers structured summaries and
    extracted commitments at the moment you need them.
  dimensions:
    initiation: Strongly product-initiated
    effort: Zero
    timing: After problem (captures during, delivers later)
    continuity: Embedded (meeting platform, email client)
  retention_risk: >
    Strongest retention of any model. Value compounds over time
    as the knowledge graph grows. Does not depend on habit
    formation. The only architecture where app graveyard may
    be structurally mitigated.
  habit_burden: None
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Low
        rationale: Compounding value creates switching cost
      MC2:
        level: Low
        rationale: Zero user initiation required
      MC3:
        level: Low
        rationale: Continues working during absence
      MC4:
        level: Moderate
        rationale: Meeting bot may be visible
      MC5:
        level: Low
        rationale: Value delivery, not interruption
  refs:
    primary_problems: [FP07, FP09]
    claims: [C014, C015, C017, C018, C028]
  derived_from: Our_L2

M3:
  type: engagement_model
  name: Modality Shift
  plain_language: >
    Changes the input channel from writing (high activation
    barrier) to speaking (low barrier). You talk through your
    work; the product transforms it into professional output.
    Same cognitive work, different channel. Addresses the blank
    page problem directly.
  dimensions:
    initiation: User-initiated (optionally product-prompted)
    effort: Moderate
    timing: During problem
    continuity: Separate surface (mostly standalone)
  retention_risk: >
    Moderate. Per-use value — each use is independent, no
    compounding. Risk is that editing AI output re-triggers the
    same paralysis the tool was meant to avoid.
  habit_burden: Moderate
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Moderate
        rationale: Per-use tool, no habituation loop
      MC2:
        level: Moderate
        rationale: User must remember it exists
      MC3:
        level: Low
        rationale: No state to accumulate failure
      MC4:
        level: Low
        rationale: Voice input is commonplace
      MC5:
        level: Low
        rationale: Not notification-dependent
  refs:
    primary_problems: [FP11]
    claims: []
  derived_from: Our_L2

M4:
  type: engagement_model
  name: Intelligent Reordering and Decision Reduction
  plain_language: >
    Sits on top of your existing task system and decides what
    to show you based on what you're likely to actually do
    right now — not just what's important. Reduces your
    decision from "pick from 50 items" to "do this one thing."
    Bridges the gap between neurologically accessible and
    genuinely important.
  dimensions:
    initiation: Balanced — user opens, product decides what to show
    effort: Low
    timing: Before problem
    continuity: Embedded (layer on existing task tool)
  retention_risk: >
    Moderate to good. Algorithm improves with use, creating
    mild switching cost. Risk is out of sight, out of mind —
    user must open or check the tool. Mitigated by pushing
    top task via notification.
  habit_burden: Low
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Moderate
        rationale: Algorithm learning creates some stickiness
      MC2:
        level: Moderate
        rationale: User must open the tool
      MC3:
        level: Moderate
        rationale: Task list can accumulate
      MC4:
        level: Low
        rationale: Appears as general productivity layer
      MC5:
        level: Moderate
        rationale: Depends on push if used
  refs:
    primary_problems: [FP05]
    secondary_problems: [FP01]
    claims: [C012, C013]
  derived_from: Our_L2

M5:
  type: engagement_model
  name: Calibration Feedback Loop
  plain_language: >
    Collects data on how long things actually take versus your
    estimates, then feeds back the discrepancy. Holds up a
    mirror that the ADHD brain cannot hold for itself. Over
    time, calibrates your internal model against reality.
  dimensions:
    initiation: Balanced — user estimates, product feeds back
    effort: Moderate
    timing: Before and during problem
    continuity: Partially embedded (calendar integration + own surface)
  retention_risk: >
    Compounding value as calibration data accumulates. But
    breaks entirely if the user stops estimating — the loop
    depends on a micro-habit. Cold start problem is real.
  habit_burden: Moderate
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Moderate
        rationale: Value compounds but requires active use
      MC2:
        level: High
        rationale: User must estimate to get value
      MC3:
        level: High
        rationale: Calibration data shows failures
      MC4:
        level: Low
        rationale: Looks like a productivity timer
      MC5:
        level: Moderate
        rationale: Overrun alerts may habituate
  refs:
    primary_problems: [FP03]
    claims: [C008, C009]
  derived_from: Our_L2

M6:
  type: engagement_model
  name: Periodic Injection into Existing Workflow
  plain_language: >
    Monitors your long-term projects for engagement decay.
    When a project is being neglected, injects small concrete
    tasks into your existing daily workflow. You don't go to
    the product — it comes to you with a 15-minute action that
    bridges present you and the neglected obligation.
  dimensions:
    initiation: Strongly product-initiated
    effort: Low per interaction
    timing: Before problem (preventive)
    continuity: Embedded (injects into existing task flow)
  retention_risk: >
    Does not depend on habit formation. Risk is quality of
    injected tasks — if generic, the tool becomes another
    ignored reminder. Must be specific and genuinely useful.
  habit_burden: Minimal
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Moderate
        rationale: Injected tasks may habituate
      MC2:
        level: Low
        rationale: Product pushes to user
      MC3:
        level: Low
        rationale: Tasks appear fresh, not as backlog
      MC4:
        level: Low
        rationale: Tasks appear in existing tool
      MC5:
        level: Moderate
        rationale: Depends on task notifications
  refs:
    primary_problems: [FP08]
    claims: [C013]
  derived_from: Our_L2

M7:
  type: engagement_model
  name: Structured Check-In and Guided Routine
  plain_language: >
    Walks you through a daily planning ritual: review
    commitments, estimate durations, pick priorities, reflect
    at end of day. The structure is external — the product
    provides scaffolding that the ADHD brain cannot generate.
    Mirrors the coaching model. The paradox: most recommended
    by practitioners, most abandoned by users.
  dimensions:
    initiation: Product-prompted, user-executed
    effort: Moderate
    timing: Before problem (preventive planning)
    continuity: Separate surface (dedicated check-in view)
  retention_risk: >
    Highest risk of any model. Critically dependent on habit
    formation. If the user misses a few days, overdue items
    accumulate and trigger the shame spiral. The app graveyard
    is largely a Structured Check-In graveyard.
  habit_burden: Highest
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Very High
        rationale: Fixed routine habituates
      MC2:
        level: Very High
        rationale: User must show up
      MC3:
        level: Very High
        rationale: Missed days accumulate visibly
      MC4:
        level: Moderate
        rationale: ADHD-branded planners are visible
      MC5:
        level: High
        rationale: Depends on check-in reminders
  refs:
    primary_problems: [FP01, FP03, FP05]
    claims: [C029, C030, C031]
  derived_from: Our_L2

M8:
  type: engagement_model
  name: On-Demand Cognitive Scaffolding
  plain_language: >
    Available when you're stuck. You bring a complex task; it
    breaks it into micro-steps, drafts a starting point, or
    generates a decision framework. The executive function
    support your brain cannot provide at that moment, on demand.
  dimensions:
    initiation: User-initiated
    effort: Low to moderate
    timing: During problem
    continuity: Either separate or embedded
  retention_risk: >
    Moderate. Episodic use — no degradation without use but
    no compounding either. Risk is the user forgetting the
    tool exists when stuck, which is precisely the out of
    sight, out of mind problem.
  habit_burden: Low
  evaluations:
    meta_challenge_vulnerability:
      MC1:
        level: Low
        rationale: Per-use, no routine to decay
      MC2:
        level: High
        rationale: User must self-identify stuck state
      MC3:
        level: Low
        rationale: No state, no failure accumulation
      MC4:
        level: Low
        rationale: Looks like any AI assistant
      MC5:
        level: Low
        rationale: Not notification-dependent
  refs:
    primary_problems: [FP01, FP11]
    claims: [C011]
  derived_from: Our_L2


