# System_of_Record.yaml
# Canonical data store for ADHD workplace phenomena research.
# All documentation and visualizations derived from this file.
#
# Schema defined in _framework section below. Entity data follows.
# Open issues tracked in two ticket sections at end of file:
#   - CONTENT TICKETS (CT_nnn): data gaps, evidence needs, entity changes
#   - SYSTEM TICKETS (ST_nnn): schema changes, process design, structural decisions
#
# NOT INCLUDED (deferred):
# - Technologies (TECH_01-TECH_10) -> _archived/Technologies.yaml
# - Foundations (FDN01-FDN07) -> deferred until technologies ready
# - Raw evidence bases -> referenced via source IDs and analysis_docs fields

# _framework_draft.yaml
# Schema definitions for System_of_Record.yaml
# DRAFT v2 — revised after review session.
#
# This section defines:
#   1. Entity type definitions (fields, required/optional, valid values)
#   2. Evaluation dimensions (gates, scoring rubrics, market gap)
#   3. Derivation formulas
#   4. Confidence model (including compound propagation)
#   5. Staging conventions

_framework:

  # ─────────────────────────────────────────────────────────────
  # SCOPE
  # ─────────────────────────────────────────────────────────────
  scope:
    domain: "ADHD workplace functional problems"
    population: "Working adults with ADHD in the UK"
    constraint: "Software products only — no clinical validation, no service/content dependencies"
    default_outcome: "Do not pursue. Analysis must surface something compelling to override."

  # ─────────────────────────────────────────────────────────────
  # KEY DEFINITIONS
  # ─────────────────────────────────────────────────────────────
  definitions:
    functional_problem: >
      An observable failure to complete, maintain, or perform a
      work-relevant task or behaviour. Defined by what goes wrong
      in practice, not by underlying symptom or internal experience.
    problem_cluster: >
      A set of functional problems that share root causes, co-occur
      frequently, or where addressing one meaningfully affects others.
      Clusters are identified during analysis, not assumed in advance.
      A problem may be standalone or part of a cluster — this is an
      emergent property of the research. A cluster requires multiple
      member problems; single-problem relationships (amplification,
      convergence) are properties of the problem, not clusters.
    mechanism: >
      An explanatory cognitive or neurological process that produces
      one or more functional problems. Mechanisms describe WHY problems
      occur. A mechanism is NOT a restated problem — it must explain
      something that the problem description alone does not.
    meta_challenge: >
      A cross-cutting structural constraint that applies to ANY product
      targeting ADHD workplace productivity, regardless of problem
      cluster, engagement model, or implementation approach. Not a risk
      that can be solved by a feature. A persistent environmental or
      neurological constraint that shapes the entire solution space.
    engagement_model: >
      A structural archetype of user-product interaction. Describes
      how an intervention reaches the user — initiation, effort,
      timing, and integration characteristics. Not a product
      specification; a pattern that makes meta-challenge severity
      and problem addressability concrete.
    claim: >
      An evidence-backed assertion about ADHD workplace phenomena.
      Claims are the atomic units of evidence. Each claim has a
      statement, source references, and a confidence level.
      Claims may reference external sources (primary evidence) or
      internal entity data (derived conclusions).
    source: >
      A citable piece of primary evidence: a study, survey, consensus
      statement, or curated community evidence aggregate. Sources are
      the root of the evidence chain — they are not derived from other
      entities in this system.

  # ─────────────────────────────────────────────────────────────
  # EVIDENCE TIERS
  # ─────────────────────────────────────────────────────────────
  evidence_tiers:
    1:
      label: High
      description: "Peer-reviewed research, government/NHS data, systematic reviews"
    2:
      label: Moderate
      description: "Industry reports, large-scale surveys (n>500), expert opinion, user reviews/forum synthesis"
    3:
      label: Low-Moderate
      description: "Smaller surveys, multiple consistent anecdotal sources"
    4:
      label: Low
      description: "Single studies, individual anecdotes, extrapolation from adjacent domains"

  # ─────────────────────────────────────────────────────────────
  # CONFIDENCE MODEL
  # ─────────────────────────────────────────────────────────────
  #
  # Every claim and evaluation carries a confidence value.
  #
  # For claims referencing only external sources:
  #   confidence = evidence_tier of source(s)
  #   When multiple sources: use the best (lowest number) tier
  #   that substantively supports the assertion.
  #
  # For claims referencing internal entities (derived conclusions):
  #   confidence = compound, computed as follows.
  #
  confidence_model:
    primary_confidence:
      description: >
        For claims whose evidence is entirely from external sources.
        Confidence equals the evidence tier of the strongest
        substantive source supporting the assertion.
      rule: "best_tier(sources)"

    compound_confidence:
      description: >
        For claims whose evidence includes or consists of internal
        entity evaluations (other claims, entity scores, etc.).
        Compound confidence reflects that derived conclusions inherit
        the uncertainty of their inputs AND add inferential distance.
      rule: >
        1. Collect the confidence values of all referenced inputs
           (source tiers for external refs, compound confidence for
           internal refs).
        2. Take the WEAKEST input (highest tier number) as the floor.
           A chain is only as strong as its weakest link.
        3. Add an inferential penalty of +0.5 per derivation step
           beyond direct observation. A claim derived from two
           first-order claims gets +0.5. A claim derived from
           second-order claims gets +1.0. Cap at Tier 4.
        4. Round to nearest 0.5.
      examples:
        - description: >
            "Noisy General, Quiet Specific" — derived from market gap
            evaluations on FP07 (tier 2), FP09 (tier 2), FP05 (tier 2).
          calculation: "weakest input = 2.0, one derivation step = +0.5, result = 2.5"
        - description: >
            "FP03 is highest-leverage intervention point" — derived from
            connectedness scores (tier 1-2), cluster hub analysis (tier 1-2),
            downstream problem counts (tier 1).
          calculation: "weakest input = 2.0, one derivation step = +0.5, result = 2.5"
        - description: >
            A strategic conclusion built on two second-order claims
            (each at compound confidence 2.5).
          calculation: "weakest input = 2.5, one derivation step = +0.5, result = 3.0"

    staleness: >
      When any input to a compound claim changes, the claim's confidence
      is marked stale until re-evaluated. The entity retains its last
      computed confidence with a `stale: true` flag. Maintenance
      procedure: search all claims referencing the changed entity ID,
      mark them stale, re-evaluate in dependency order (leaves first).

  # ─────────────────────────────────────────────────────────────
  # REF CONVENTIONS
  # ─────────────────────────────────────────────────────────────
  #
  # Relationships are stored in one canonical direction only.
  # No reverse refs. To resolve the reverse direction, scan
  # entities of the relevant type. This eliminates sync risk —
  # acceptable for AI agents that load the full file into context.
  #
  ref_conventions:
    principle: >
      Each relationship is stored once, in one canonical direction.
      No reverse refs are maintained. To resolve the reverse
      direction, scan entities of the relevant type for references
      to the target ID.
    canonical_directions:
      - relationship: "evidence supports entity"
        canonical: "entity.refs.claims lists its supporting claim IDs"
        reverse: "to find what entities a claim supports, scan all entities' refs.claims"
      - relationship: "mechanism explains problem"
        canonical: "problem.refs.mechanisms lists its explanatory mechanism IDs"
        reverse: "to find what problems a mechanism explains, scan all problems' refs.mechanisms"
      - relationship: "problem belongs to cluster"
        canonical: "cluster.refs.members lists its member problem IDs"
        reverse: "to find what clusters a problem belongs to, scan all clusters' refs.members"
      - relationship: "meta-challenge amplifies meta-challenge"
        canonical: "meta_challenge.refs.amplifies lists MC IDs it amplifies"
        reverse: "to find what amplifies a given MC, scan all MCs' refs.amplifies"
      - relationship: "engagement model addresses problem"
        canonical: "engagement_model.refs.primary_problems lists FP IDs it addresses"
        reverse: "to find what models address a problem, scan all engagement_models' refs.primary_problems"

  # ─────────────────────────────────────────────────────────────
  # ENTITY TYPE: source
  # ─────────────────────────────────────────────────────────────
  entity_types:
    source:
      description: "Citable primary evidence — studies, surveys, curated aggregates"
      fields:
        type:           { required: true,  values: ["source"] }
        name:           { required: true,  format: "string — Author/Title/Year" }
        description:    { required: true,  format: "prose — what the source covers" }
        source_type:    { required: true,  values: ["clinical_study", "population_cohort", "consensus_statement", "rct", "meta_analysis", "community_aggregate", "practitioner_survey", "case_series"] }
        evidence_tier:  { required: true,  format: "Tier N or Tier N-M for ranges" }
        url:            { required: false, format: "URL or DOI" }
        analysis_docs:  { required: false, format: "list of doc IDs (P1A, P2B, etc.)" }
        limitations:    { required: true,  format: "prose — known limitations, caveats, generalisability constraints" }

    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: claim
    # ─────────────────────────────────────────────────────────────
    claim:
      description: >
        An evidence-backed assertion. Claims are the atomic units of
        the evidence graph. All evaluations, scores, and conclusions
        ultimately trace back to claims.
      fields:
        type:           { required: true,  values: ["claim"] }
        statement:      { required: true,  format: "prose — the assertion being made" }
        confidence:     { required: true,  format: "number 1.0-4.0 (computed per confidence_model)" }
        refs:
          sources:       { required: false, format: "list of source IDs (for primary evidence)" }
          depends_on:    { required: false, format: "list of claim IDs (for derived claims)" }
          entities:      { required: false, format: "list of entity IDs (for derived claims referencing entity data)" }
          challenged_by: { required: false, format: "list of claim IDs (adversarial — claims that contradict or qualify this one)" }
        comments:       { required: false, format: "prose — provenance, caveats, notes on evidence quality" }
        stale:          { required: false, format: "boolean — true when inputs have changed since last evaluation" }
      groups:
        thesis:
          description: >
            A claim with group: thesis represents a contested assumption
            where a change in confidence would prompt strategic
            reconsideration — not just an update to scores or evaluations.
            Theses are identified through strategic judgment, not
            mechanical classification. A thesis requires a counter_thesis
            sub-object articulating the strongest argument against it.
          additional_fields:
            group:           { required: true, values: ["thesis"] }
            counter_thesis:
              statement:     { required: true, format: "prose — the strongest argument against this thesis" }
              evidence:      { required: true, format: "list of source/claim IDs supporting the counter-argument" }
              strength:      { required: true, format: "prose — where and why the counter-argument has force" }

    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: problem
    # ─────────────────────────────────────────────────────────────
    problem:
      description: "Observable workplace functional failure"
      fields:
        type:           { required: true,  values: ["problem"] }
        name:           { required: true,  format: "string" }
        plain_language: { required: true,  format: "prose — what the failure looks like in practice" }
        functional_definition: { required: true, format: "prose — 3-4 sentence formal definition of the observable work task failure" }
        status:         { required: true,  values: ["active", "filtered_out", "below_threshold"], default: "active" }
        cluster_notes:  { required: false, format: "prose — analytical reasoning about cluster membership or absence thereof" }
        amplification_mechanism: { required: false, format: "prose — how this problem worsens other clusters (for cross-cluster amplifiers)" }
        refs:
          mechanisms:          { required: true,  format: "list of MECH IDs" }
          amplifies_clusters:  { required: false, format: "list of CL IDs (for problems that amplify clusters they don't belong to)" }
          claims:              { required: true,  format: "list of claim IDs" }
        derived_from:   { required: true,  format: "source doc ID" }
        # ── Evaluations (added during enrichment) ──
        evaluations:
          gates:
            description: "Binary pass/fail on two gates. Present for ALL problems including filtered."
            fields:
              software_amenability:
                result:    { required: true, values: ["pass", "fail", "conditional_pass"] }
                rationale: { required: true, format: "prose — why it passed or failed" }
                evidence:  { required: true, format: "list of source/claim IDs" }
              individual_addressability:
                result:    { required: true, values: ["pass", "fail", "conditional_pass"] }
                rationale: { required: true, format: "prose — why it passed or failed" }
                evidence:  { required: true, format: "list of source/claim IDs" }
                caveat:    { required: false, format: "prose — for conditional results" }
          scoring:
            description: >
              Three-dimension scoring. Only present for problems with
              status=active (i.e., passed both gates).
            fields:
              frequency:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose — assessment and reasoning" }
                evidence:  { required: true, format: "list of source/claim IDs with tier annotations" }
                tier:      { required: true, format: "number 1-4" }
              differentiation:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose" }
                evidence:  { required: true, format: "list of source/claim IDs with tier annotations" }
                tier:      { required: true, format: "number 1-4" }
              connectedness:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose" }
                evidence:  { required: true, format: "list of source/claim IDs with tier annotations" }
                tier:      { required: true, format: "number 1-4" }
              total:       { derived: true, formula: "frequency + differentiation + connectedness" }
              evidence_tier_avg: { derived: true, formula: "mean(frequency.tier, differentiation.tier, connectedness.tier)" }
          market_gap:
            description: >
              Five-dimension market assessment. Present for problems
              scoring >= 10 on the Problem Layer.
            fields:
              noise:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose" }
              product_enumeration:
                description: "Existing products targeting this problem"
                format: >
                  Array of { product, positioning, maturity } objects.
              maturity:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose" }
              adhd_user_reviews:
                score:     { required: true, format: "integer 1-5" }
                rationale: { required: true, format: "prose" }
              root_cause_of_failure:
                description: "Why existing solutions fail for ADHD users"
                format: >
                  Array of { cause, reasoning } objects. Each identifies
                  a distinct failure pattern in existing products.
              market_gap_score: { derived: true, formula: "noise + maturity + adhd_user_reviews" }
      status_definitions:
        active: "Passed both gates. Scored. Eligible for market gap and downstream analysis."
        filtered_out: >
          Failed one or both gates. Entity exists with full gate
          evaluation data. Not scored. May be revisited if gate
          criteria change or new evidence emerges.
        below_threshold: >
          Passed gates but scored too low to warrant further analysis.
          Retains scoring data.

    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: mechanism
    # ─────────────────────────────────────────────────────────────
    mechanism:
      description: >
        Explanatory cognitive/neurological process producing functional
        problems. Must explain something the problem description alone
        does not. Must NOT merely restate the problem at a different
        abstraction level.
      fields:
        type:             { required: true,  values: ["mechanism"] }
        name:             { required: true,  format: "string" }
        plain_language:   { required: true,  format: "prose — what the process is and how it produces problems" }
        variability:      { required: true,  format: "prose — how stable/variable across days, contexts, individuals" }
        does_not_explain: { required: true,  format: "prose — explicit boundaries of what this mechanism does NOT account for" }
        refs:
          underlies_challenges: { required: false, format: "list of MC IDs" }
          evidence:             { required: true, format: "list of claim IDs" }
        derived_from:     { required: true, format: "source doc ID" }

    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: cluster
    # ─────────────────────────────────────────────────────────────
    cluster:
      description: >
        Observed co-occurrence grouping of multiple functional problems.
        Describes WHAT goes together. Mechanisms describe WHY.
        A cluster must have multiple member problems. Single-problem
        relationships (amplification, convergence, standalone status)
        are properties of the problem entity, not separate clusters.
      identification_criteria: >
        Clusters are identified based on evidence of co-occurrence,
        shared root causes, and cascading effects. Per methodology:
        "Do not force clustering; record what emerges." A cluster
        requires evidence from at least two independent sources.
      fields:
        type:             { required: true,  values: ["cluster"] }
        name:             { required: true,  format: "string" }
        causal_direction: { required: true,  format: "prose — direction, nature, and strength of causal relationships between members" }
        refs:
          hub:              { required: true,  format: "FP ID — the problem that causes/exacerbates others in this cluster" }
          members:          { required: true,  format: "list of FP IDs (includes hub)" }
          primary_mechanism: { required: true,  format: "MECH ID" }
          claims:           { required: true,  format: "list of claim IDs" }
        derived_from:     { required: true, format: "source doc ID" }

    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: meta_challenge
    # ─────────────────────────────────────────────────────────────
    meta_challenge:
      description: "Cross-cutting structural constraint on all ADHD workplace products"
      inclusion_criteria:
        all_required:
          - criterion: "cross_cluster"
            test: "Applies to at least 2 of the 3 primary problem clusters"
          - criterion: "cross_engagement_model"
            test: "Applies to at least 2 engagement models"
          - criterion: "not_implementation_solvable"
            test: "Cannot be resolved by building a specific feature"
          - criterion: "evidenced"
            test: "Supported by evidence beyond speculation"
      fields:
        type:           { required: true, values: ["meta_challenge"] }
        name:           { required: true, format: "string" }
        plain_language: { required: true, format: "prose" }
        severity:       { required: true, values: ["Critical", "High", "Moderate-High", "Moderate"] }
        severity_rationale: { required: true, format: "prose — reasoning for the severity assignment" }
        severity_evidence:  { required: true, format: "list of source/claim IDs supporting the severity level" }
        evidence_tier:  { required: true, format: "Tier range" }
        key_evidence:   { required: true, format: "prose — summary of strongest evidence" }
        evaluations:
          inclusion_test:
            description: "Per-criterion pass/fail with reasoning"
            format: >
              Map of criterion name → { met: boolean, reasoning: prose }.
              All four criteria must be met for confirmation.
        refs:
          clusters_affected: { required: true, format: "list of CL IDs" }
          claims:            { required: true, format: "list of claim IDs" }
          amplifies:         { required: true, format: "list of MC IDs" }
        derived_from:   { required: true, format: "source doc ID" }


    # ─────────────────────────────────────────────────────────────
    # ENTITY TYPE: engagement_model
    # ─────────────────────────────────────────────────────────────
    engagement_model:
      description: >
        Structural archetype of user-product interaction. Describes
        how an intervention reaches the user — initiation, effort,
        timing, and integration characteristics. Not a product
        specification; a pattern that makes meta-challenge severity
        and problem addressability concrete.
      fields:
        type:           { required: true, values: ["engagement_model"] }
        name:           { required: true, format: "string" }
        plain_language: { required: true, format: "prose — what this interaction pattern looks like" }
        dimensions:
          initiation:   { required: true, format: "prose — user-initiated to product-initiated spectrum" }
          effort:       { required: true, format: "prose — effort level required from user" }
          timing:       { required: true, format: "prose — before/during/after problem" }
          continuity:   { required: true, format: "prose — separate surface vs embedded" }
        retention_risk: { required: true, format: "prose — structural retention characteristics" }
        habit_burden:   { required: true, format: "prose — degree of habit formation required" }
        cluster_compatibility:
          description: "Per-cluster compatibility assessment for this engagement pattern"
          format: >
            Map of CL ID → { rating: S|P|X, rationale: prose }.
            S = Strongly compatible, P = Partially compatible,
            X = Incompatible.
        evaluations:
          meta_challenge_vulnerability:
            description: "Per-MC vulnerability assessment for this engagement pattern"
            format: "Map of MC ID → { level: Very High/High/Moderate/Low, rationale: prose }"
        refs:
          primary_problems:   { required: true,  format: "list of FP IDs" }
          secondary_problems: { required: false, format: "list of FP IDs" }
          claims:             { required: true,  format: "list of claim IDs" }
        derived_from: { required: true, format: "source doc ID" }

  # ─────────────────────────────────────────────────────────────
  # EVALUATION RUBRICS
  # Transcribed from S0 methodology. These are the canonical
  # definitions — entity evaluations reference these.
  # ─────────────────────────────────────────────────────────────
  evaluation_rubrics:

    gates:
      gate_1_software_amenability:
        question: >
          Can software provide meaningful support for this problem
          without requiring clinical validation or human services?
        pass: >
          Software can fully address, substantially reduce impact,
          or provide meaningful support as part of a broader approach.
        fail: >
          Software can only assist while primary intervention requires
          human/clinical support, or problem fundamentally requires
          clinical intervention.
        data_sources: >
          Clinical guidelines on ADHD workplace interventions,
          occupational therapy literature, intervention studies
          comparing software vs. human-supported approaches.

      gate_2_individual_addressability:
        question: >
          Can the user achieve meaningful improvement through their
          own actions, without requiring cooperation from managers,
          colleagues, or organisational systems?
        pass: >
          User can address fully through own actions, or external
          cooperation is helpful but not required, or partial solution
          possible alone with full solution requiring some cooperation.
        fail: >
          Requires manager/colleague/system cooperation for meaningful
          improvement, or problem primarily resides in workplace/systems
          such that individual action is insufficient.
        data_sources: >
          Workplace accommodation literature, ADHD coaching case studies,
          user community discussions about what they can vs. cannot control.

    problem_layer:
      scoring_convention: "Higher scores are better (more attractive problem to address)"
      total_formula: "Q1 + Q2 + Q3"

      Q1_frequency:
        question: "How frequently does this problem disrupt work tasks or workflow?"
        anchors:
          5: "Multiple times per day"
          4: "Daily"
          3: "Several times per week"
          2: "Weekly"
          1: "Monthly or less"
        data_sources: >
          ADHD prevalence studies with frequency data, workplace
          productivity research, self-report surveys, time-tracking
          or diary studies.

      Q2_differentiation:
        question: "How differentiated is the ADHD experience of this problem?"
        note: >
          Measures whether ADHD-specific design would provide meaningful
          advantage, not whether the problem is exclusive to ADHD.
        anchors:
          5: "Highly differentiated: qualitatively different triggers, patterns, or failure modes requiring specific design"
          4: "Substantially differentiated: same problem but significantly more severe/frequent; standard solutions often fail"
          3: "Moderately differentiated: common problem with ADHD-specific aspects affecting which solutions work"
          2: "Slightly differentiated: general problem, ADHD adds some nuance but standard solutions mostly work"
          1: "Not differentiated: ADHD users experience this the same way as everyone else"
        data_sources: >
          Comparative studies of ADHD vs. neurotypical task performance,
          qualitative research on ADHD lived experience, user reviews
          comparing ADHD vs. general user feedback on existing tools.

      Q3_connectedness:
        question: "Does this problem connect to other functional problems?"
        note: >
          Problems that act as hubs — causing or exacerbating multiple
          downstream failures — are more valuable to solve.
        anchors:
          5: "Hub problem: addressing this would meaningfully reduce 4+ other identified problems"
          4: "Cluster centre: addressing this would meaningfully reduce 2-3 other problems"
          3: "Connected: addressing this would meaningfully reduce 1 other problem"
          2: "Loosely related: shares context with others but addressing it wouldn't directly reduce them"
          1: "Isolated: standalone problem with no meaningful connection to others"
        data_sources: >
          Causal models of ADHD workplace dysfunction, coaching/therapy
          literature on intervention sequencing, user narratives
          describing cascading failures.

    market_gap_layer:
      scoring_convention: "Higher scores indicate larger opportunity (less competition, poorer existing solutions)"
      market_gap_formula: "Q1 + Q3 + Q4"
      combined_formula: "problem_layer.total + market_gap_layer.market_gap_score"
      combined_note: "Combined score is indicative, not mechanically determinative."

      Q1_noise:
        question: "How noisy is the market for solutions to this problem?"
        anchors:
          5: "Very quiet: few products, clear signal"
          4: "Quiet: small number of identifiable solutions"
          3: "Moderate: established players exist"
          2: "Noisy: crowded market, difficult to differentiate"
          1: "Very noisy: saturated market"
        data_sources: >
          App store searches, Google search results, Product Hunt,
          G2/Capterra, ADHD community tool recommendation threads.

      Q2_product_enumeration:
        question: "What products exist that target this problem?"
        format: >
          Array of { product, positioning, maturity } objects.
          Include: ADHD-specific vs general, estimated maturity,
          funding if known.
        data_sources: >
          App stores, ProductHunt, Crunchbase, company websites,
          ADHD community recommendations, review aggregators.

      Q3_maturity:
        question: "How mature are the leading products in this space?"
        anchors:
          5: "Nascent: no established players, early-stage or none"
          4: "Emerging: products exist but still evolving"
          3: "Established: clear market leaders, 2-5 years, funded"
          2: "Mature: dominant players, 5+ years, feature-complete"
          1: "Consolidated: category owned by 1-2 players, high switching costs"
        data_sources: >
          Crunchbase funding history, company pages, Wayback Machine,
          press coverage.

      Q4_adhd_user_reviews:
        question: "What do user reviews indicate about effectiveness for ADHD users?"
        anchors:
          5: "Consistently negative: complaints about ineffectiveness, high abandonment"
          4: "Mixed-negative: some positive but frequent frustrations, workarounds needed"
          3: "Mixed: roughly balanced positive and negative"
          2: "Mixed-positive: generally positive with common specific complaints"
          1: "Consistently positive: ADHD users report effectiveness, strong retention"
        data_sources: >
          App store reviews filtered for ADHD mentions, Reddit threads,
          ADDitude magazine reviews, ADHD coach/therapist recommendations.

      Q5_root_cause_of_failure:
        question: "Where existing solutions fall short, what appears to be the root cause?"
        format: >
          Array of { cause, reasoning } objects. Each identifies a
          distinct failure pattern. Do not force categories; describe
          what you observe.
        data_sources: >
          Negative review patterns, product shutdown post-mortems,
          founder interviews, user community complaints.

    solution_layer:
      scoring_convention: >
        Higher scores indicate more favourable solution characteristics
        (easier to build, easier to adopt).
      prerequisite: >
        Before scoring, write a brief description of the proposed
        solution approach (2-3 sentences covering core mechanism and
        value proposition).
      Q1_complexity:
        question: "How complex is the minimum feature set required to deliver first meaningful value?"
        anchors:
          5: "Minimal: single core feature, could prototype in days"
          4: "Light: 2-3 features, 2-4 weeks engineering effort"
          3: "Moderate: coherent feature set, 1-2 months engineering effort"
          2: "Substantial: multiple interdependent features, 3-6 months effort"
          1: "Complex: requires extensive feature development, 6+ months before meaningful value"
        data_sources: >
          Competitor feature sets, MVP case studies in adjacent spaces,
          technical architecture patterns for similar problems.
      Q2_behavioural_change:
        question: "How much behavioural change or ongoing effort is required from the user?"
        anchors:
          5: "Passive: works in background, no habit formation needed"
          4: "Minimal: occasional interaction, fits into existing workflows"
          3: "Moderate: requires regular engagement but builds on existing behaviours"
          2: "Significant: new habits required, ongoing discipline needed"
          1: "Demanding: major workflow change, high ongoing effort, works against ADHD tendencies"
        data_sources: >
          Habit formation research for ADHD populations, retention/churn
          data from similar products, user testimonials about what made
          tools stick or fail.
      Q3_setup_effort:
        question: "How much user input or setup effort is needed before first value is realised?"
        anchors:
          5: "Instant: value on first use, no setup required"
          4: "Quick: brief setup (<5 minutes), value within first session"
          3: "Moderate: some configuration needed, value within first day of use"
          2: "Investment: requires data entry or learning curve, value within first week"
          1: "Heavy: extensive setup, training, or data migration before any value"
        data_sources: >
          Onboarding flow analysis of competitors, time-to-value metrics
          from similar products, user complaints about setup friction.
      Q4_integration_dependency:
        question: "How dependent is the solution on integrations with external systems or specific usage contexts?"
        anchors:
          5: "Standalone: works independently, no external dependencies"
          4: "Optional integrations: enhanced by connections but valuable alone"
          3: "Standard integrations: requires common tools (e.g., calendar, email) with well-documented APIs"
          2: "Specific integrations: depends on particular platforms or workplace systems"
          1: "Deep integration: requires enterprise deployment, IT approval, or specific contexts to function"
        data_sources: >
          API documentation review, competitor integration lists,
          enterprise vs. consumer product positioning.

  # ─────────────────────────────────────────────────────────────
  # COMPATIBILITY PRINCIPLES
  # Judgment consistency rules applied when evaluating L1-L2
  # compatibility (cluster × engagement model). From CS3.
  # ─────────────────────────────────────────────────────────────
  compatibility_principles:
    - id: frequency_to_initiation
      name: "Frequency-to-initiation matching"
      principle: >
        High-frequency problems favour low-effort, ambient models.
        Low-frequency problems can tolerate higher-effort, on-demand models.
    - id: awareness_to_timing
      name: "Awareness-to-timing matching"
      principle: >
        Problems the user notices in real-time can use reactive models.
        Problems only visible in retrospect require proactive or capture models.
    - id: co_occurrence_to_breadth
      name: "Co-occurrence-to-breadth matching"
      principle: >
        Tightly co-occurring problems need models that can address
        multiple problems per interaction.
    - id: context_to_surface
      name: "Context-to-surface matching"
      principle: >
        Where the problem occurs determines which delivery surfaces
        and interaction points are viable.

  # ─────────────────────────────────────────────────────────────
  # DERIVATION FORMULAS
  # Named formulas that produce derived values from entity data.
  # ─────────────────────────────────────────────────────────────
  derivation_formulas:
    problem_score:
      formula: "frequency + differentiation + connectedness"
      inputs: "evaluations.scoring.{frequency,differentiation,connectedness}.score"
      output: "evaluations.scoring.total"

    evidence_tier_avg:
      formula: "mean(frequency.tier, differentiation.tier, connectedness.tier)"
      inputs: "evaluations.scoring.{frequency,differentiation,connectedness}.tier"
      output: "evaluations.scoring.evidence_tier_avg"

    market_gap_score:
      formula: "noise + maturity + adhd_user_reviews"
      inputs: "evaluations.market_gap.{noise,maturity,adhd_user_reviews}.score"
      output: "evaluations.market_gap.market_gap_score"

    combined_score:
      formula: "problem_score + market_gap_score"
      inputs: ["evaluations.scoring.total", "evaluations.market_gap.market_gap_score"]
      output: "evaluations.combined_score"
      note: "Indicative, not mechanically determinative."

  # ─────────────────────────────────────────────────────────────
  # TICKET CONVENTIONS
  # Open issues tracked at end of file in two sections.
  # Content tickets: data gaps, evidence needs, entity changes.
  # System tickets: schema changes, process design, structural decisions.
  # ─────────────────────────────────────────────────────────────
  content_ticket:
    description: >
      Tracked issues relating to data within the SoR — missing evidence,
      entity additions/removals, scoring updates, evidence gaps. Each
      ticket is a to-do item for content changes.
    fields:
      id:             { required: true,  format: "CT_NNN" }
      subject:        { required: true,  format: "prose — what needs to change" }
      source:         { required: true,  format: "doc or entity ID where it was found" }
      added:          { required: true,  format: "ISO date" }
      status:         { required: true,  format: "open | closed | superseded_by_CT_NNN" }
      resolution:     { required: false, format: "prose — how it was resolved" }

  system_ticket:
    description: >
      Tracked issues relating to how the SoR works — schema changes,
      new fields, process design, structural decisions, evaluation
      framework modifications. Each ticket is a to-do item for
      macro/structural changes.
    fields:
      id:             { required: true,  format: "ST_NNN" }
      subject:        { required: true,  format: "prose — what structural change is needed" }
      source:         { required: true,  format: "doc or entity ID where it was identified" }
      added:          { required: true,  format: "ISO date" }
      status:         { required: true,  format: "open | deferred | flagged | closed" }
      resolution:     { required: false, format: "prose — how it was resolved" }

  # ─────────────────────────────────────────────────────────────
  # RECORDING REQUIREMENTS
  # What must be recorded for every evaluation.
  # ─────────────────────────────────────────────────────────────
  recording_requirements:
    every_evaluation:
      - "Score or result"
      - "Rationale (prose reasoning)"
      - "Evidence references (source/claim IDs)"
      - "Evidence tier"
    every_entity:
      - "All required fields per entity type"
      - "derived_from reference to source document"
    interpretation_note: >
      Scores are indicative. They provide structure for comparison
      but do not mechanically determine outcomes. Decisions are
      judgment calls informed by patterns of scores, evidence
      quality, and factors outside this framework.


